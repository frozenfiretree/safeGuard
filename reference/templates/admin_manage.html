<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资阳电网 - 管理员管理系统</title>
  <link href="static/css/all.min.css" rel="stylesheet">
  <style>
    /* ================= 资阳电网 - 离线专用主题 ================= */
    :root {
      /* 核心色板：国家电网绿 + 科技蓝 + 警示黄 */
      --bg-deep: #001a1a;        /* 深墨绿背景 */
      --bg-panel: rgba(2, 26, 26, 0.95);
      --primary-color: #00ffcc;  /* 荧光青 (电力流) */
      --secondary-color: #009688;/* 稳重绿 (基建) */
      --accent-color: #ffd700;   /* 高压警示黄 */
      --text-main: #e0f2f1;
      --text-muted: #80cbc4;
      --danger: #ff5252;
      --success: #69f0ae;
      --border-glow: 0 0 10px rgba(0, 255, 204, 0.3);
      --grid-line: rgba(0, 255, 204, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* 纯CSS实现的网格背景（无需下载图片） */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -2;
    }

    /* 动态 Canvas 背景层 */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* 顶部高压线装饰条 */
    .top-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--secondary-color), var(--primary-color), var(--accent-color));
      box-shadow: 0 0 15px var(--primary-color);
      z-index: 100;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      min-height: 650px;
      background: var(--bg-panel);
      /* 边框发光效果 */
      border: 1px solid var(--secondary-color);
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 255, 204, 0.05);
      display: flex;
      position: relative;
      /* 工业风切角设计 */
      clip-path: polygon(
        0 10px, 10px 0, 
        100% 0, 100% calc(100% - 10px), 
        calc(100% - 10px) 100%, 0 100%
      );
    }

    /* 左侧面板 */
    .left-panel {
      width: 340px;
      background: rgba(0, 0, 0, 0.3);
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(0, 255, 204, 0.1);
      position: relative;
    }

    /* 资阳电网 Logo 区域 */
    .logo {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
      padding-bottom: 20px;
      border-bottom: 1px dashed rgba(0, 255, 204, 0.2);
    }

    /* 自定义CSS绘制闪电图标（防止FontAwesome加载失败时图标缺失） */
    .custom-bolt {
      width: 40px;
      height: 60px;
      background: var(--primary-color);
      margin: 0 auto 15px;
      clip-path: polygon(55% 0, 5% 60%, 40% 60%, 30% 100%, 95% 40%, 55% 40%);
      box-shadow: 0 0 20px var(--primary-color);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.8; transform: scale(1); box-shadow: 0 0 10px var(--primary-color); }
      50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 25px var(--primary-color); }
      100% { opacity: 0.8; transform: scale(1); box-shadow: 0 0 10px var(--primary-color); }
    }

    .logo h1 {
      font-size: 1.6rem;
      color: #fff;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
    }

    .logo p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 5px;
      font-weight: bold;
    }
    
    .logo-badge {
      display: inline-block;
      background: var(--accent-color);
      color: #000;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 2px;
      font-weight: bold;
      margin-top: 5px;
    }

    /* 表单样式 */
    .form-group {
      margin-bottom: 25px;
      position: relative;
    }

    .form-label {
      color: var(--primary-color);
      font-size: 0.85rem;
      margin-bottom: 8px;
      display: block;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 20, 20, 0.6);
      border: 1px solid rgba(0, 255, 204, 0.2);
      border-left: 3px solid var(--secondary-color);
      padding: 12px 15px;
      color: #fff;
      font-family: Consolas, monospace; /* 等宽字体适合输入账号 */
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
      background: rgba(0, 40, 40, 0.8);
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
    }

    /* 按钮样式 */
    .btn {
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
      transition: all 0.2s;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #00695c, #004d40);
      border: 1px solid var(--primary-color);
      color: var(--primary-color);
    }

    .btn-primary:hover {
      background: var(--primary-color);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
    }

    .btn-danger {
      background: rgba(255, 82, 82, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }

    .btn-success {
      background: rgba(105, 240, 174, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }
    
    .btn-success:hover {
      background: var(--success);
      color: #000;
    }

    .btn-warning {
        background: rgba(255, 215, 0, 0.1);
        border: 1px solid var(--accent-color);
        color: var(--accent-color);
    }

    /* 右侧内容区域 */
    .right-panel {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      /* 使用内嵌 SVG Base64 作为背景，无需联网 */
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300ffcc' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .panel-header {
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(0, 255, 204, 0.15);
      padding-bottom: 15px;
    }

    .panel-header h2 {
      font-size: 1.5rem;
      color: #fff;
      display: flex;
      align-items: center;
    }
    
    .panel-header h2::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 24px;
      background: var(--accent-color);
      margin-right: 15px;
      box-shadow: 0 0 10px var(--accent-color);
    }

    /* 统计卡片 */
    .stats-container {
        display: flex;
        gap: 20px;
        margin-bottom: 25px;
    }

    .stat-card {
      flex: 1;
      background: rgba(0, 20, 20, 0.6);
      border: 1px solid rgba(0, 255, 204, 0.2);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::after {
        content: "";
        position: absolute;
        bottom: 0; right: 0;
        border-bottom: 15px solid var(--primary-color);
        border-left: 15px solid transparent;
        opacity: 0.5;
    }

    .stat-card h3 {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-card .value {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--primary-color);
      font-family: Consolas, monospace;
      text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
      margin-top: 5px;
    }

    /* 列表区域 */
    .admins-list-container {
      flex: 1;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(0, 255, 204, 0.1);
      margin-bottom: 20px;
    }
    
    /* 滚动条美化 */
    .admins-list-container::-webkit-scrollbar {
        width: 6px;
    }
    .admins-list-container::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.2);
    }
    .admins-list-container::-webkit-scrollbar-thumb {
        background: var(--secondary-color);
    }

    .admin-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s;
    }

    .admin-item:hover {
      background: rgba(0, 255, 204, 0.05);
      padding-left: 20px;
    }

    .admin-icon {
      width: 36px;
      height: 36px;
      background: rgba(0, 20, 20, 0.8);
      border: 1px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
    }

    .admin-name {
      color: #fff;
      font-weight: 600;
    }

    .admin-details span {
      font-family: Consolas, monospace;
      font-size: 0.85rem;
    }

    /* 添加管理员表单 */
    .add-admin-form {
      background: rgba(0, 20, 20, 0.4);
      border: 1px solid rgba(0, 255, 204, 0.2);
      padding: 20px;
      border-left: 4px solid var(--accent-color);
    }
    
    .add-admin-form h3 {
        font-size: 1rem;
        color: var(--text-main);
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }
    
    .form-row .form-group {
        margin-bottom: 0;
        flex: 1;
    }

    /* 消息提示 */
    .message {
      padding: 12px 15px;
      margin-bottom: 20px;
      background: rgba(0, 0, 0, 0.6);
      border-left: 4px solid;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 模态框 */
    .modal-overlay {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: #002222;
      border: 1px solid var(--primary-color);
      padding: 30px;
      width: 400px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        height: auto;
        clip-path: none;
      }
      .left-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--secondary-color);
      }
      .form-row {
          flex-direction: column;
      }
    }
    
    /* 版本号 */
    .version-tag {
        position: absolute;
        bottom: 10px;
        right: 15px;
        font-family: monospace;
        color: rgba(255,255,255,0.2);
        font-size: 0.7rem;
    }
  </style>
</head>
<body>

<div class="top-line"></div>

<canvas id="bgCanvas"></canvas>

<div class="container">
  <div class="left-panel">
    <div class="logo">
      <div class="custom-bolt"></div>
      <h1>资阳电网</h1>
      <p>ZIYANG POWER GRID</p>
      <span class="logo-badge">管理员管理系统</span>
    </div>

    <div id="loginForm" class="login-form">
      <h3 style="color: var(--primary-color); margin-bottom: 20px; font-weight: normal; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
        <i class="fas fa-user-lock"></i> 管理员登录
      </h3>

      <div class="form-group">
        <label class="form-label" for="username">账号 / Account</label>
        <input type="text" id="username" class="form-input" placeholder="请输入管理员账号">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码 / Password</label>
        <input type="password" id="password" class="form-input" placeholder="请输入密码">
      </div>

      <button class="btn btn-primary" onclick="login()">
        <i class="fas fa-plug"></i> 登录系统
      </button>
    </div>

    <div id="userInfo" class="user-info" style="display: none; margin-top: auto;">
      <div style="background: rgba(255,255,255,0.05); padding: 15px; border: 1px solid rgba(255,255,255,0.1);">
        <p style="color: var(--text-muted); font-size: 0.8rem;">CURRENT USER</p>
        <p style="color: var(--primary-color); font-size: 1.2rem; font-family: Consolas;" id="currentUsername"></p>
        <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0;"></div>
        <p style="color: var(--text-muted); font-size: 0.8rem;">ACCESS TIME</p>
        <p style="color: var(--accent-color); font-size: 0.9rem; font-family: Consolas;" id="loginTime"></p>
      </div>
      <button class="btn btn-danger" onclick="logout()" style="margin-top: 20px;">
        <i class="fas fa-power-off"></i> 退出登录
      </button>
    </div>
    
    <div class="version-tag">Ver 2.0.5_Admin</div>
  </div>

  <div class="right-panel">
    <div id="messageArea"></div>

    <div class="panel-header">
      <h2>系统管理员列表</h2>
      <button id="refreshBtn" class="btn btn-primary" onclick="loadAdmins()" style="display: none; width: auto; padding: 6px 15px; font-size: 0.8rem;">
        <i class="fas fa-sync-alt"></i> 同步数据
      </button>
    </div>

    <div id="statsArea" class="stats-container" style="display: none;">
      <div class="stat-card">
        <h3><i class="fas fa-users"></i> 在册管理员总数</h3>
        <div class="value" id="totalAdmins">0</div>
      </div>
    </div>

    <div class="admins-list-container">
      <div id="adminsList" class="admins-list" style="padding: 10px;">
        <p style="text-align: center; color: var(--text-muted); padding: 60px; font-family: Consolas;">
          [SYSTEM LOCKED]<br>等待授权接入...
        </p>
      </div>
    </div>

    <div id="addAdminForm" class="add-admin-form" style="display: none;">
      <h3><i class="fas fa-user-plus"></i> 新增管理员</h3>
      
      <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">
        <i class="fas fa-info-circle"></i> 提示：新增账号默认为普通权限。
      </div>

      <div class="form-row">
        <div class="form-group">
          <input type="text" id="newUsername" class="form-input" placeholder="新账号">
        </div>
        <div class="form-group">
          <input type="password" id="newPassword" class="form-input" placeholder="密码 (≥8位)">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <input type="password" id="confirmPassword" class="form-input" placeholder="确认密码">
        </div>
        <div class="form-group">
          <button class="btn btn-success" onclick="createAdmin()">
            <i class="fas fa-check"></i> 提交注册
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="changePasswordModal" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
      <h3 style="color: var(--primary-color);">修改密码</h3>
      <button onclick="closeModal('changePasswordModal')" style="background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer;">&times;</button>
    </div>
    <input type="hidden" id="changePasswordAdminId">

    <div class="form-group">
      <label class="form-label">新密码</label>
      <input type="password" id="newAdminPassword" class="form-input">
    </div>

    <div class="form-group">
      <label class="form-label">确认新密码</label>
      <input type="password" id="confirmNewPassword" class="form-input">
    </div>

    <button class="btn btn-primary" onclick="submitPasswordChange()">确认修改</button>
    <button class="btn" onclick="closeModal('changePasswordModal')" style="margin-top: 10px; background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);">取消</button>
  </div>
</div>

<script>
  // ================= 粒子背景动画 (原生JS实现，无依赖) =================
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let width, height;
  let particles = [];
  
  // 电网配色：青色节点，深绿连线
  const nodeColor = 'rgba(0, 255, 204, 0.6)';
  const lineColor = 'rgba(0, 150, 136, 0.2)';

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  
  class Particle {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.size = Math.random() * 2 + 1;
    }
    
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > width) this.vx *= -1;
      if (this.y < 0 || this.y > height) this.vy *= -1;
    }
    
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = nodeColor;
      ctx.fill();
    }
  }

  function initParticles() {
    particles = [];
    const particleCount = Math.floor(window.innerWidth / 15); // 根据屏幕宽度控制数量
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }
  }

  function animateParticles() {
    ctx.clearRect(0, 0, width, height);
    
    particles.forEach((p, index) => {
      p.update();
      p.draw();
      
      // 绘制连线，模拟电网结构
      for (let j = index + 1; j < particles.length; j++) {
        const p2 = particles[j];
        const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
        
        if (dist < 100) {
          ctx.beginPath();
          ctx.strokeStyle = lineColor;
          ctx.lineWidth = 1;
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      }
    });
    
    requestAnimationFrame(animateParticles);
  }

  window.addEventListener('resize', () => {
    resize();
    initParticles();
  });
  
  resize();
  initParticles();
  animateParticles();

  // ================= 核心业务逻辑 =================
  const API_BASE_URL = 'http://10.179.241.70:25001';
  let currentToken = null;
  let currentUser = null;

  function showMessage(text, type = 'info') {
    const messageArea = document.getElementById('messageArea');
    let color = type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--danger)' : 'var(--primary-color)';
    
    messageArea.innerHTML = `
        <div class="message" style="border-color: ${color}; color: ${color};">
            <span style="font-weight:bold;">[SYSTEM MSG]</span> ${text}
        </div>
    `;
    if (type === 'success') {
      setTimeout(() => { messageArea.innerHTML = ''; }, 3000);
    }
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      showMessage('错误：请输入完整账号和密码', 'error');
      return;
    }

    try {
      const response = await fetch(`${API_BASE_URL}/api/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (data.success) {
        currentToken = data.token;
        currentUser = data.user;
        localStorage.setItem('admin_token', currentToken);
        localStorage.setItem('admin_user', JSON.stringify(currentUser));

        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('currentUsername').textContent = currentUser.username;
        document.getElementById('loginTime').textContent = new Date().toLocaleString();

        document.getElementById('statsArea').style.display = 'flex';
        document.getElementById('addAdminForm').style.display = 'block';
        document.getElementById('refreshBtn').style.display = 'block';

        await loadAdmins();
        showMessage('登录成功，系统已接入', 'success');
      } else {
        showMessage(data.message || '登录失败', 'error');
      }
    } catch (error) {
      console.error('Login Error:', error);
      showMessage('连接超时：无法连接到内网服务器', 'error');
    }
  }

  async function checkStoredToken() {
    const token = localStorage.getItem('admin_token');
    const user = localStorage.getItem('admin_user');

    if (token && user) {
      try {
        const response = await fetch(`${API_BASE_URL}/api/admin/check_token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (data.valid) {
          currentToken = token;
          currentUser = JSON.parse(user);
          // UI Update logic
          document.getElementById('loginForm').style.display = 'none';
          document.getElementById('userInfo').style.display = 'block';
          document.getElementById('currentUsername').textContent = currentUser.username;
          document.getElementById('loginTime').textContent = new Date().toLocaleString();
          document.getElementById('statsArea').style.display = 'flex';
          document.getElementById('addAdminForm').style.display = 'block';
          document.getElementById('refreshBtn').style.display = 'block';
          await loadAdmins();
        } else {
          localStorage.removeItem('admin_token');
          localStorage.removeItem('admin_user');
        }
      } catch (error) {
        console.error('Token check failed', error);
      }
    }
  }

  async function loadAdmins() {
    if (!currentToken) return;

    try {
      const response = await fetch(`${API_BASE_URL}/api/admin/list`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: currentToken })
      });

      const data = await response.json();

      if (data.success) {
        const adminsList = document.getElementById('adminsList');
        const totalAdmins = document.getElementById('totalAdmins');

        totalAdmins.textContent = data.total;

        if (data.admins.length === 0) {
          adminsList.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px;">无数据</p>';
          return;
        }

        let html = '';
        data.admins.forEach(admin => {
          const isCurrentUser = currentUser && admin.id === currentUser.id;
          let levelText = '普通管理员';
          let levelColor = 'var(--success)'; // 绿色
          let adminIcon = 'fa-user';

          if (admin.level === 1) {
              levelText = '超级管理员';
              levelColor = 'var(--accent-color)'; // 金色
              adminIcon = 'fa-user-shield';
          } else if (admin.level === 3) {
              levelText = '审计员';
              levelColor = '#a855f7'; // 紫色 (高亮显示审计员)
              adminIcon = 'fa-clipboard-check'; // 使用审计图标
          }

          html += `
              <div class="admin-item">
                  <div class="admin-icon" style="color: ${levelColor}; border-color: ${levelColor};">
                      <i class="fas ${adminIcon}"></i>
                  </div>
                  <div class="admin-info">
                      <div class="admin-name">
                          ${admin.username}
                          ${isCurrentUser ? '<span style="font-size: 0.7rem; background: var(--primary-color); color: #000; padding: 1px 4px; border-radius: 2px; margin-left: 5px;">本机</span>' : ''}
                      </div>
                      <div class="admin-details" style="opacity: 0.8; margin-top: 5px;">
                          <span style="color: var(--text-muted);">ID: ${admin.id}</span>
                          <span style="margin: 0 8px;">|</span>
                          <span style="color: ${levelColor}">${levelText}</span>
                          <span style="margin: 0 8px;">|</span>
                          <span>${admin.created_at}</span>
                      </div>
                  </div>
                  <div class="admin-actions">
                      ${!isCurrentUser ? `
                          <button class="btn" style="width:auto; padding:5px 10px; background: transparent; color: var(--danger); border: 1px solid var(--danger);" onclick="confirmDelete(${admin.id}, '${admin.username}')">
                              <i class="fas fa-trash-alt"></i>
                          </button>
                      ` : ''}
                      <button class="btn" style="width:auto; padding:5px 10px; background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); margin-left: 5px;" onclick="openChangePasswordModal(${admin.id})">
                          <i class="fas fa-key"></i>
                      </button>
                  </div>
              </div>
          `;
        });

        adminsList.innerHTML = html;
      } else {
        showMessage(data.message || '加载失败', 'error');
      }
    } catch (error) {
      console.error('Load Error:', error);
      showMessage('网络错误', 'error');
    }
  }

  async function createAdmin() {
    if (!currentToken) {
      showMessage('会话已过期', 'error');
      return;
    }

    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    const level = 2;

    if (!username || !password) {
      showMessage('字段不能为空', 'error');
      return;
    }

    if (password.length < 8) {
      showMessage('密码强度不足 (≥8位)', 'error');
      return;
    }

    if (password !== confirmPassword) {
      showMessage('密码不一致', 'error');
      return;
    }

    try {
      const response = await fetch(`${API_BASE_URL}/api/admin/create`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: currentToken, username, password, level })
      });

      const data = await response.json();

      if (data.success) {
        showMessage(`账号 ${username} 创建成功`, 'success');
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        await loadAdmins();
      } else {
        showMessage(data.message || '创建失败', 'error');
      }
    } catch (error) {
      showMessage('网络错误', 'error');
    }
  }

  function confirmDelete(adminId, username) {
    if (confirm(`警告：确认注销账号 "${username}" 吗？此操作不可逆。`)) {
      deleteAdmin(adminId);
    }
  }

  async function deleteAdmin(adminId) {
    if (!currentToken) return;
    try {
      const response = await fetch(`${API_BASE_URL}/api/admin/delete`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: currentToken, admin_id: adminId })
      });
      const data = await response.json();
      if (data.success) {
        showMessage('账号已注销', 'success');
        await loadAdmins();
      } else {
        showMessage(data.message || '操作失败', 'error');
      }
    } catch (error) {
      showMessage('网络错误', 'error');
    }
  }

  function openChangePasswordModal(adminId) {
    document.getElementById('changePasswordAdminId').value = adminId;
    document.getElementById('newAdminPassword').value = '';
    document.getElementById('confirmNewPassword').value = '';
    document.getElementById('changePasswordModal').style.display = 'flex';
  }

  async function submitPasswordChange() {
    const adminId = document.getElementById('changePasswordAdminId').value;
    const newPassword = document.getElementById('newAdminPassword').value.trim();
    const confirmPassword = document.getElementById('confirmNewPassword').value.trim();

    if (!newPassword || newPassword.length < 8) {
      showMessage('新密码长度不足', 'error');
      return;
    }

    if (newPassword !== confirmPassword) {
      showMessage('新密码不一致', 'error');
      return;
    }

    try {
      const response = await fetch(`${API_BASE_URL}/api/admin/change_password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: currentToken, admin_id: adminId, new_password: newPassword })
      });

      const data = await response.json();
      if (data.success) {
        showMessage('密码更新成功', 'success');
        closeModal('changePasswordModal');
      } else {
        showMessage(data.message || '更新失败', 'error');
      }
    } catch (error) {
      showMessage('网络错误', 'error');
    }
  }

  function closeModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
  }

  function logout() {
    currentToken = null;
    currentUser = null;
    localStorage.removeItem('admin_token');
    localStorage.removeItem('admin_user');
    
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('userInfo').style.display = 'none';
    document.getElementById('statsArea').style.display = 'none';
    document.getElementById('addAdminForm').style.display = 'none';
    document.getElementById('refreshBtn').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('adminsList').innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 40px;">等待授权接入...</p>';
    
    showMessage('已安全退出', 'info');
  }

  document.addEventListener('DOMContentLoaded', () => {
    checkStoredToken();
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  });
</script>
</body>
</html>
