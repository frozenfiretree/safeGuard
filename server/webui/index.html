        <div class="card"><h3>OCR 服务</h3><div class="metric"><strong style="font-size:30px;">${escapeHtml(ocr.status || 'unknown')}</strong>${badge(ocr.status)}</div><p class="muted">${escapeHtml(firstValue(ocr.service_url, ocr.error))}</p></div>
        <div class="card"><h3>gRPC 上传</h3><div class="metric"><strong style="font-size:30px;">${escapeHtml(grpc.status || 'unknown')}</strong>${badge(grpc.status)}</div><p class="muted">${escapeHtml(grpcAddress)}</p></div>
        <div class="card"><h3>升级报告</h3><div class="metric"><strong>${upgradeRows.length}</strong><span>Agent</span></div></div>
      </div>
      <div class="grid two">
        <section class="panel"><div class="panel-head"><div><h3 class="panel-title">OCR 健康明细</h3><div class="panel-sub">${escapeHtml(firstValue(ocr.service_url, 'OCR 服务地址未返回'))}</div></div>${badge(ocr.status)}</div><div class="panel-body">
          <dl class="kv">
            <dt>服务存活</dt><dd>${boolBadge(!!ocr.service_alive, '存活', '不可达')}</dd>
            <dt>模型完整性</dt><dd>${boolBadge(!!ocr.models_ok, '完整', '异常')}</dd>
            <dt>已初始化</dt><dd>${boolBadge(!!ocr.ocr_initialized, '已初始化', '未初始化')}</dd>
            <dt>已预热</dt><dd>${boolBadge(!!ocr.warmup_completed, '已预热', '未预热')}</dd>
            <dt>运行设备</dt><dd>${escapeHtml(firstValue(ocr.runtime_device, ocrHealth.runtime_device))}</dd>
            <dt>模型目录</dt><dd class="truncate" title="${escapeHtml(firstValue(ocr.model_home, ocrIntegrity.model_home))}">${escapeHtml(firstValue(ocr.model_home, ocrIntegrity.model_home))}</dd>
            <dt>缺失项</dt><dd class="truncate" title="${escapeHtml(missingItemsSummary(ocrMissing))}">${escapeHtml(missingItemsSummary(ocrMissing))}</dd>
            <dt>延迟</dt><dd>${escapeHtml(valueOrDash(ocr.latency_ms))} ms</dd>
            <dt>错误摘要</dt><dd class="truncate" title="${escapeHtml(errorSummary(ocr))}">${escapeHtml(errorSummary(ocr))}</dd>
          </dl>
        </div></section>
        <section class="panel"><div class="panel-head"><div><h3 class="panel-title">gRPC 健康明细</h3><div class="panel-sub">${escapeHtml(grpcAddress)}</div></div>${badge(grpc.status)}</div><div class="panel-body">
          <dl class="kv">
            <dt>启用状态</dt><dd>${grpc.enabled === undefined ? badge('unknown', '-') : boolBadge(!!grpc.enabled, '启用', '未启用')}</dd>
            <dt>监听地址</dt><dd>${escapeHtml(firstValue(grpc.host, '-'))}:${escapeHtml(firstValue(grpc.port, '-'))}</dd>
            <dt>健康状态</dt><dd>${badge(grpc.status || (grpc.serving ? 'ok' : 'error'))}</dd>
            <dt>Serving</dt><dd>${boolBadge(!!grpc.serving, '是', '否')}</dd>
            <dt>最近检查</dt><dd>${grpcCheckedAt === '-' ? '-' : fmtTime(grpcCheckedAt)}</dd>
            <dt>延迟</dt><dd>${escapeHtml(valueOrDash(grpc.latency_ms))} ms</dd>
            <dt>错误摘要</dt><dd class="truncate" title="${escapeHtml(errorSummary(grpc))}">${escapeHtml(errorSummary(grpc))}</dd>
          </dl>
        </div></section>
      </div>
      <section class="panel"><div class="panel-head"><h3 class="panel-title">Agent 升级状态</h3></div><div class="panel-body">${table([
        { title: 'Agent', key: 'agent_id' },
        { title: '主机名', key: 'hostname' },
        { title: 'IP', key: 'ip' },
        { title: '当前版本', key: 'agent_version' },
        { title: '目标版本', key: 'upgrade_target' },
        { title: '更新时间', render: r => fmtTime(r.updated_at) },
      ], upgradeRows)}</div></section>`;
      $('app').innerHTML = shell('运行状态', '展示 OCR、gRPC 上传服务与 Agent 升级报告的当前运行状态。', content);
    }

    async function renderConfig(force) {
      if (force || !Object.keys(state.data.config).length) state.data.config = await request('/admin/configs');
      const cfg = state.data.config.config || state.data.config;
      const content = `<section class="panel config-main-panel"><div class="panel-head"><div><h3 class="panel-title">系统配置</h3><div class="panel-sub">配置版本：${escapeHtml(state.data.config.config_version || '-')}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn" id="restoreDefaultConfig"><i class="fas fa-undo"></i> 恢复默认配置</button><button class="btn primary" id="saveConfig"><i class="fas fa-cloud-upload-alt"></i> 上传配置</button></div></div><div class="panel-body"><div class="config-board">
        ${configListCard('scan_dirs', '扫描目录', 'Agent 初始扫描并入队上传的目录。', cfg.scan_dirs)}
        ${configListCard('watch_dirs', '实时监控目录', 'Agent 常驻监控文件变化的目录。', cfg.watch_dirs)}
        ${configListCard('exclude_paths', '排除路径', '命中这些路径前缀的文件不会被扫描或监控。', cfg.exclude_paths)}
        <div class="config-card">
          <h3>检测文件类型</h3>
          <p>点击后缀方块启用或停用对应类型，启用时会高亮。</p>
          <div class="ext-grid" id="extensionGrid">${configExtensionChips(cfg.include_extensions)}</div>
        </div>
        <div class="config-card">
          <h3>最大文件大小</h3>
          <p>超过该大小的文件会跳过检测。</p>
          <div class="config-select-row"><select class="select" id="maxFileSize">${configOptions([20, 50, 100, 200, 500, 1024], cfg.max_file_size_mb || 100, ' MB')}</select></div>
        </div>
        <div class="config-card">
          <h3>心跳间隔</h3>
          <p>Agent 与服务器同步状态和配置变更的周期。</p>
          <div class="config-select-row"><select class="select" id="heartbeatInterval">${configOptions([15, 30, 60, 120, 300, 600], cfg.heartbeat_interval_sec || 60, ' 秒')}</select></div>
        </div>
      </div></div></section>
      <section class="panel upgrade-config-card"><div class="panel-head"><div><h3 class="panel-title">Agent 版本更新</h3><div class="panel-sub">单独上传升级包，不随系统配置上传变化。</div></div></div><div class="panel-body">
        <div class="upgrade-box">
          <div class="upgrade-file"><input id="upgradeFile" type="file" accept=".exe,application/x-msdownload,application/octet-stream"></div>
          <div class="upgrade-actions"><button class="btn" id="uploadUpgrade"><i class="fas fa-upload"></i> 上传更新版本</button><button class="btn danger" id="clearUpgrade">清空升级配置</button></div>
          <div class="upgrade-meta">
            <span>版本</span><strong id="upgradeVersion" title="${escapeHtml((cfg.upgrade && cfg.upgrade.version) || '-')}">${escapeHtml((cfg.upgrade && cfg.upgrade.version) || '-')}</strong>
            <span>Checksum</span><strong id="upgradeChecksum" title="${escapeHtml((cfg.upgrade && cfg.upgrade.checksum) || '-')}">${escapeHtml((cfg.upgrade && cfg.upgrade.checksum) || '-')}</strong>
          </div>
        </div>
      </div></section>`;
      $('app').innerHTML = shell('系统配置', '以卡片方式维护 Agent 扫描、监控、上传与升级策略。', content);
      bindConfigCards(cfg);
      $('restoreDefaultConfig').addEventListener('click', () => {
        if (!confirm('确认恢复默认配置？这只会重置页面上的普通配置，不会影响 Agent 版本更新。')) return;
        applyConfigDefaults();
        toast('已恢复默认配置，点击上传配置后生效');
      });
      $('saveConfig').addEventListener('click', async () => {
        const payload = collectConfigPayload();
        if (!payload) return;
        if (!confirm('确认上传并更新系统配置？Agent 会在下次同步后应用新配置。')) return;
        state.data.config = await request('/admin/configs', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        await renderConfig(false);
        toast('系统配置已上传');
      });
    }

    const CONFIG_EXTENSIONS = ['.doc', '.docx', '.xlsx', '.pdf', '.ppt', '.pptx', '.csv', '.txt', '.png', '.jpg', '.jpeg', '.bmp'];
    const DEFAULT_AGENT_CONFIG = {
      scan_dirs: ['C:\\test', '%USERPROFILE%\\Downloads', '%USERPROFILE%\\Documents'],
      watch_dirs: ['C:\\test', '%USERPROFILE%\\Downloads', '%USERPROFILE%\\Documents'],
      exclude_paths: ['C:\\Windows\\', 'C:\\Program Files\\', 'C:\\Program Files (x86)\\', 'C:\\ProgramData\\', '%USERPROFILE%\\AppData\\', '/proc', '/sys', '/dev', '/run', '/var/lib/docker', '/tmp'],
      include_extensions: CONFIG_EXTENSIONS.slice(),
      max_file_size_mb: 100,
      heartbeat_interval_sec: 60,
    };
    const configPathOk = (value) => {
      const text = String(value || '').trim();
      if (!text) return false;
      if (/^%[A-Z0-9_]+%[\\/].+/i.test(text)) return true;
      if (/^[A-Za-z]:\\[^:*?"<>|]+/.test(text)) return true;
      if (/^\\\\[^\\/:*?"<>|]+\\[^\\/:*?"<>|]+/.test(text)) return true;
      if (/^\/[^:*?"<>|]+/.test(text)) return true;
      return false;
    };
    function configListCard(key, title, desc, values) {
      const items = (Array.isArray(values) && values.length ? values : []).map(value => configListRow(key, value)).join('');
      return `<div class="config-card" data-config-list="${key}">
        <h3>${escapeHtml(title)}</h3><p>${escapeHtml(desc)}</p>
        <div class="config-list" id="${key}List">${items}</div>
        <div class="config-add-row"><input class="field" id="${key}Input" placeholder="例如 C:\\test 或 %USERPROFILE%\\Documents"><button class="btn" data-add-config="${key}"><i class="fas fa-plus"></i> 增加</button></div>
        <div class="config-error" id="${key}Error"></div>
      </div>`;
    }
    function configListRow(key, value) {
      const valid = configPathOk(value);
      return `<div class="config-list-row ${valid ? '' : 'invalid'}" data-config-item="${key}">
        <input class="field" value="${escapeHtml(value || '')}">
        <button class="btn small danger" data-remove-config="${key}"><i class="fas fa-trash"></i></button>
      </div>`;
    }
    function configExtensionChips(enabledValues) {
      const enabled = new Set((enabledValues || CONFIG_EXTENSIONS).map(x => String(x).toLowerCase()));
      const all = Array.from(new Set([...CONFIG_EXTENSIONS, ...enabled]));
      return all.map(ext => `<button class="ext-chip ${enabled.has(ext) ? 'active' : ''}" data-ext="${escapeHtml(ext)}" title="${enabled.has(ext) ? '已启用' : '未启用'} ${escapeHtml(ext)}">${escapeHtml(ext)}</button>`).join('');
    }
    function configOptions(values, selected, suffix) {
      const current = Number(selected);
      const all = Array.from(new Set([...values, current])).filter(Number.isFinite).sort((a, b) => a - b);
      return all.map(value => `<option value="${value}" ${value === current ? 'selected' : ''}>${value}${suffix}</option>`).join('');
    }
    function setConfigListValues(key, values) {
      $(`${key}List`).innerHTML = (values || []).map(value => configListRow(key, value)).join('');
      $(`${key}Error`).textContent = '';
      const input = $(`${key}Input`);
      if (input) input.value = '';
    }
    function applyConfigDefaults() {
      setConfigListValues('scan_dirs', DEFAULT_AGENT_CONFIG.scan_dirs);
      setConfigListValues('watch_dirs', DEFAULT_AGENT_CONFIG.watch_dirs);
      setConfigListValues('exclude_paths', DEFAULT_AGENT_CONFIG.exclude_paths);
      $('extensionGrid').innerHTML = configExtensionChips(DEFAULT_AGENT_CONFIG.include_extensions);
      $('maxFileSize').value = String(DEFAULT_AGENT_CONFIG.max_file_size_mb);
      $('heartbeatInterval').value = String(DEFAULT_AGENT_CONFIG.heartbeat_interval_sec);
    }
    function bindConfigCards(cfg) {
      document.querySelectorAll('[data-add-config]').forEach(btn => btn.addEventListener('click', () => {
        const key = btn.dataset.addConfig;
        const input = $(`${key}Input`);
        const value = (input.value || '').trim();
        const error = $(`${key}Error`);
        if (!configPathOk(value)) {
          error.textContent = '路径格式不合规，请输入 Windows 绝对路径、UNC 路径、环境变量路径或 Linux 绝对路径。';
          return;
        }
        error.textContent = '';
        $(`${key}List`).insertAdjacentHTML('beforeend', configListRow(key, value));
        input.value = '';
      }));
      document.querySelectorAll('[data-config-list]').forEach(card => card.addEventListener('click', event => {
        const remove = event.target.closest('[data-remove-config]');
        if (remove) remove.closest('.config-list-row').remove();
      }));
      document.querySelectorAll('[data-config-list]').forEach(card => card.addEventListener('input', event => {
        const row = event.target.closest('.config-list-row');
        if (row) row.classList.toggle('invalid', !configPathOk(event.target.value));
      }));
      $('extensionGrid').addEventListener('click', event => {
        const chip = event.target.closest('.ext-chip');
        if (!chip) return;
        chip.classList.toggle('active');
        chip.title = `${chip.classList.contains('active') ? '已启用' : '未启用'} ${chip.dataset.ext}`;
      });
      $('uploadUpgrade').addEventListener('click', () => uploadUpgradePackage());
      $('clearUpgrade').addEventListener('click', () => clearUpgradeConfig());
      if (cfg.upgrade && cfg.upgrade.version) $('upgradeVersion').dataset.version = cfg.upgrade.version;
      if (cfg.upgrade && cfg.upgrade.checksum) $('upgradeChecksum').dataset.checksum = cfg.upgrade.checksum;
    }
    function collectConfigList(key) {
      const rows = Array.from(document.querySelectorAll(`#${key}List .config-list-row`));
      const values = rows.map(row => row.querySelector('input').value.trim()).filter(Boolean);
      const invalid = rows.some(row => !configPathOk(row.querySelector('input').value));
      $(`${key}Error`).textContent = invalid ? '存在格式不合规的路径，请修正后再上传配置。' : '';
      return invalid ? null : Array.from(new Set(values));
    }
    function collectConfigPayload() {
      const scanDirs = collectConfigList('scan_dirs');
      const watchDirs = collectConfigList('watch_dirs');
      const excludePaths = collectConfigList('exclude_paths');
      if (!scanDirs || !watchDirs || !excludePaths) return null;
      const extensions = Array.from(document.querySelectorAll('.ext-chip.active')).map(btn => btn.dataset.ext);
      if (!extensions.length) {
        toast('至少启用一种检测文件类型');
        return null;
      }
      return {
        scan_dirs: scanDirs,
        watch_dirs: watchDirs,
        exclude_paths: excludePaths,
        include_extensions: extensions,
        max_file_size_mb: Number($('maxFileSize').value),
        heartbeat_interval_sec: Number($('heartbeatInterval').value),
      };
    }
    async function uploadUpgradePackage() {
      const file = $('upgradeFile').files && $('upgradeFile').files[0];
      if (!file) {
        toast('请选择 .exe 升级文件');
        return;
      }
      if (!file.name.toLowerCase().endsWith('.exe')) {
        toast('只能上传 .exe 文件');
        return;
      }
      const form = new FormData();
      form.append('file', file);
      const res = await fetch(`${API}/admin/upgrades/upload`, { method: 'POST', headers: authHeaders(), body: form });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}: /admin/upgrades/upload`);
      const data = await res.json();
      const upgrade = { version: data.version || '', checksum: data.checksum || '' };
      state.data.config = await request('/admin/configs', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ upgrade }) });
      setUpgradeDisplay(upgrade);
      toast('升级包已上传，Agent 更新配置已生效');
    }
    function setUpgradeDisplay(upgrade) {
      $('upgradeVersion').textContent = (upgrade && upgrade.version) || '-';
      $('upgradeChecksum').textContent = (upgrade && upgrade.checksum) || '-';
      if (upgrade && upgrade.version) $('upgradeVersion').dataset.version = upgrade.version;
      else delete $('upgradeVersion').dataset.version;
      if (upgrade && upgrade.checksum) $('upgradeChecksum').dataset.checksum = upgrade.checksum;
      else delete $('upgradeChecksum').dataset.checksum;
    }
    async function clearUpgradeConfig() {
      if (!confirm('确认清空 Agent 版本更新配置？')) return;
      state.data.config = await request('/admin/configs', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ upgrade: null }) });
      setUpgradeDisplay(null);
      toast('Agent 更新配置已清空');
    }

    function bindTableClick(tableId, handler) {
      const tableEl = $(tableId) || $('app').querySelector('table.clickable');
      if (!tableEl) return;
      tableEl.querySelectorAll('tbody tr[data-id]').forEach(row => row.addEventListener('click', () => handler(row.dataset.id)));
    }
    async function openAgent(id) {
      const row = state.data.agents.find(r => String(r.agent_id) === String(id));
      openDrawer(`Agent 详情：${row?.hostname || id}`, `<dl class="kv">${Object.entries(row || {}).map(([k, v]) => `<dt>${escapeHtml(k)}</dt><dd>${typeof v === 'object' ? json(v) : escapeHtml(v)}</dd>`).join('')}</dl>`);
    }
    async function openFile(id) {
      const detail = await request(`/admin/files/${encodeURIComponent(id)}`);
      openDrawer(`文件详情：${detail.file_name || id}`, `
        <div class="tabs"><button class="btn active" data-tab="overview">Overview</button><button class="btn" data-tab="versions">Versions</button><button class="btn" data-tab="json">JSON</button></div>
        <div id="tabOverview"><dl class="kv">
          <dt>文件名</dt><dd>${escapeHtml(detail.file_name)}</dd><dt>路径</dt><dd>${escapeHtml((detail.current_paths || []).join('; ') || '-')}</dd>
          <dt>风险</dt><dd>${riskBadge(detail.risk_level)}</dd><dt>状态</dt><dd>${badge(detail.detection_status)}</dd>
          <dt>命中规则</dt><dd>${escapeHtml(JSON.stringify(detail.rule_hits || []))}</dd><dt>LLM摘要</dt><dd>${escapeHtml(detail.llm_summary || '-')}</dd>
        </dl></div><div id="tabVersions" style="display:none;">${table([
          { title: '序号', key: 'version' },
          { title: '路径', key: 'path' },
          { title: 'Agent', key: 'agents' },
          { title: 'Hash', key: 'hash' },
          { title: '更新时间', key: 'updated' },
        ], (detail.current_paths || []).map((path, index) => ({
          version: index + 1,
          path,
          agents: (detail.agents || []).join(', '),
          hash: detail.file_hash,
          updated: detail.updated_at,
        })))}</div><div id="tabJson" style="display:none;">${json(detail)}</div>`);
      bindTabs();
    }
    function openEvent(id) { openDrawer(`事件详情：${id}`, json(state.data.events.find(r => String(r.event_id) === String(id)) || {})); }
    function openUpload(id) { openDrawer(`上传会话：${id}`, json(state.data.uploads.find(r => String(r.session_id) === String(id)) || {})); }
    function openTask(id) { openDrawer(`任务详情：${id}`, json(state.data.tasks.find(r => String(r.id) === String(id)) || {})); }
    function bindTabs() {
      document.querySelectorAll('[data-tab]').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('[data-tab]').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        $('tabOverview').style.display = btn.dataset.tab === 'overview' ? '' : 'none';
        if ($('tabVersions')) $('tabVersions').style.display = btn.dataset.tab === 'versions' ? '' : 'none';
        $('tabJson').style.display = btn.dataset.tab === 'json' ? '' : 'none';
      }));
    }
    function openDrawer(title, body) {
      $('drawerMask').classList.add('show');
      $('drawer').classList.add('show');
      $('drawer').innerHTML = `<div class="drawer-head"><div><h3 class="drawer-title">${escapeHtml(title)}</h3><p class="muted">真实后端数据</p></div><button class="btn" onclick="closeDrawer()">关闭</button></div><div class="drawer-body">${body}</div>`;
    }
    function closeDrawer() {
      $('drawerMask').classList.remove('show');
      $('drawer').classList.remove('show');
      $('drawer').innerHTML = '';
    }
    window.closeDrawer = closeDrawer;

    function initParticles() {
      const canvas = $('particle-canvas');
      const ctx = canvas.getContext('2d');
      let w = 0, h = 0, particles = [];
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        const count = Math.min(88, Math.max(46, Math.floor(w * h / 22000)));
        particles = Array.from({ length: count }, () => ({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.38, vy: (Math.random() - 0.5) * 0.38, r: Math.random() * 1.8 + 0.7 }));
        Object.values(state.charts).forEach(chart => chart && chart.resize && chart.resize());
      }
      function tick() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach((p, i) => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > w) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,240,255,.55)'; ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j], d = Math.hypot(p.x - q.x, p.y - q.y);
            if (d < 130) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.strokeStyle = `rgba(0,240,255,${(1 - d / 130) * 0.16})`; ctx.stroke(); }
          }
        });
        requestAnimationFrame(tick);
      }
      resize(); tick(); window.addEventListener('resize', resize);
    }

    function applyViewportMode() {
      const vv = window.visualViewport;
      const scale = vv && Number.isFinite(vv.scale) ? vv.scale : 1;
      const height = vv && Number.isFinite(vv.height) ? vv.height : window.innerHeight;
      const compact = height < 980 || scale > 1.02;
      document.body.classList.toggle('viewport-compact', compact);
      Object.values(state.charts).forEach(chart => chart && chart.resize && chart.resize());
    }

    document.addEventListener('DOMContentLoaded', () => {
      applyViewportMode();
      initParticles();
      initNav();
      window.addEventListener('resize', applyViewportMode);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', applyViewportMode);
      }
      window.addEventListener('hashchange', () => {
        state.view = location.hash.replace('#/', '') || 'overview';
        document.querySelectorAll('.nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.view === state.view));
        if (state.authenticated) loadView();
      });
      $('drawerMask').addEventListener('click', closeDrawer);
      initLogin();
    });
  </script>
