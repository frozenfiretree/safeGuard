<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>SafeGuard 内网敏感文件检测与溯源系统</title>
  <link href="/static/css/all.min.css" rel="stylesheet">
  <script src="/static/js/echarts.js"></script>
  <style>
    :root {
      --bg: #050a15;
      --panel: rgba(11, 21, 34, 0.84);
      --panel-2: rgba(15, 28, 43, 0.76);
      --panel-3: rgba(21, 35, 50, 0.66);
      --line: rgba(0, 240, 255, 0.18);
      --line-strong: rgba(0, 240, 255, 0.42);
      --text: #d8e7ef;
      --muted: #8296a7;
      --dim: #516474;
      --primary: #00f0ff;
      --blue: #4b9eff;
      --green: #00d68f;
      --yellow: #ffd166;
      --orange: #ff8a3d;
      --red: #ff3d5a;
      --success: #00d68f;
      --warning: #ffd166;
      --danger: #ff3d5a;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
      --layout-gap: 14px;
      --section-gap: 14px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      min-width: 0;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(5, 10, 21, 0.96), rgba(5, 10, 21, 0.99)),
        repeating-linear-gradient(90deg, rgba(0, 240, 255, 0.035) 0 1px, transparent 1px 88px),
        repeating-linear-gradient(0deg, rgba(75, 158, 255, 0.025) 0 1px, transparent 1px 88px),
        var(--bg);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    #particle-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .app { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }
    .app.locked { display: none; }
    .topbar {
      min-height: 122px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 22px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 12, 23, 0.92);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 38px rgba(0, 0, 0, 0.35);
    }
    .brand { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 12px; position: relative; }
    .brand-core {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 360px;
      min-height: 58px;
      padding: 7px 34px 7px 14px;
      border-left: 4px solid var(--primary);
      background: linear-gradient(90deg, rgba(0, 240, 255, 0.15) 0%, rgba(0, 240, 255, 0.04) 78%, transparent 100%);
      clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
      overflow: hidden;
    }
    .brand-core::after {
      content: "";
      position: absolute;
      inset: 0 auto 0 -70%;
      width: 42%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
      transform: skewX(-20deg);
      animation: brandScanLight 4s linear infinite;
      pointer-events: none;
    }
    @keyframes brandScanLight {
      0% { left: -70%; }
      100% { left: 145%; }
    }
    .brand-mark {
      position: relative;
      z-index: 1;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 4px;
      display: grid;
      place-items: center;
      color: var(--success);
      font-size: 24px;
      background: rgba(0, 240, 255, 0.1);
      box-shadow: 0 0 16px rgba(0, 240, 255, 0.26);
      text-shadow: 0 0 12px rgba(0, 214, 143, 0.75);
      animation: brandShieldPulse 2.4s ease-in-out infinite;
    }
    .brand-shield {
      width: 24px;
      height: 28px;
      display: block;
      background: linear-gradient(180deg, #dffcff 0%, var(--success) 70%, #00a873 100%);
      clip-path: polygon(50% 0, 88% 15%, 82% 64%, 50% 100%, 18% 64%, 12% 15%);
      filter: drop-shadow(0 0 8px rgba(0, 214, 143, 0.8));
    }
    .brand-shield::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 20px;
      margin: 4px 0 0 11px;
      background: rgba(0, 19, 26, 0.32);
      border-radius: 2px;
    }
    @keyframes brandShieldPulse {
      0%, 100% { opacity: 0.82; text-shadow: 0 0 8px rgba(0, 214, 143, 0.62); }
      50% { opacity: 1; text-shadow: 0 0 24px rgba(0, 214, 143, 0.9), 0 0 8px rgba(255, 255, 255, 0.5); }
    }
    .brand-copy {
      position: relative;
      z-index: 1;
      min-width: 0;
    }
    .brand h1 { margin: 0; font-size: 24px; line-height: 1.05; color: #fff; letter-spacing: 0; text-shadow: 0 0 12px rgba(255, 255, 255, 0.22); }
    .brand p { margin: 5px 0 0; font-size: 13px; color: var(--primary); }
    .nav {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(var(--nav-count, 10), minmax(0, 1fr));
      align-items: stretch;
      gap: 10px;
      overflow: visible;
    }
    .nav button {
      width: 100%;
      min-width: 0;
      height: 36px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      background: transparent;
      white-space: nowrap;
      transition: 0.18s ease;
      font-size: 12px;
    }
    .nav button:hover { color: var(--primary); background: rgba(0, 240, 255, 0.08); border-color: var(--line); }
    .nav button.active { color: var(--primary); background: rgba(0, 240, 255, 0.12); border-color: var(--line-strong); box-shadow: inset 0 0 18px rgba(0, 240, 255, 0.06); }
    .top-actions { position: absolute; right: 0; top: 4px; display: flex; align-items: center; gap: 10px; }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 16%, rgba(0, 240, 255, 0.13), transparent 34%),
        rgba(5, 10, 21, 0.82);
      backdrop-filter: blur(8px);
    }
    .login-screen.hidden { display: none; }
    .login-card {
      width: min(920px, 100%);
      min-height: 520px;
      display: grid;
      grid-template-columns: 0.82fr 1fr;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(7, 19, 32, 0.94);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.62), inset 0 0 36px rgba(0, 240, 255, 0.035);
      overflow: hidden;
    }
    .login-side {
      padding: 42px 34px;
      border-right: 1px solid rgba(0, 240, 255, 0.16);
      background: rgba(0, 0, 0, 0.18);
    }
    .login-bolt {
      width: 54px;
      height: 72px;
      margin-bottom: 28px;
      background: linear-gradient(180deg, #d9fbff, var(--primary));
      clip-path: polygon(55% 0, 7% 60%, 42% 60%, 30% 100%, 95% 39%, 58% 39%);
      box-shadow: 0 0 28px rgba(0, 240, 255, 0.62);
    }
    .login-side h2 { margin: 0; color: #fff; font-size: 28px; line-height: 1.25; }
    .login-side p { margin: 14px 0 0; color: var(--muted); line-height: 1.7; }
    .login-panel { padding: 54px 44px; display: flex; flex-direction: column; justify-content: center; }
    .login-panel h3 { margin: 0; color: #fff; font-size: 24px; }
    .login-panel p { margin: 10px 0 28px; color: var(--muted); }
    .login-field { display: grid; gap: 8px; margin-bottom: 18px; color: var(--primary); font-size: 13px; }
    .login-input {
      height: 46px;
      width: 100%;
      border: 1px solid rgba(0, 240, 255, 0.26);
      border-left: 3px solid var(--primary);
      border-radius: 4px;
      padding: 0 14px;
      color: #fff;
      background: rgba(0, 0, 0, 0.24);
      outline: none;
      font-family: Consolas, "SFMono-Regular", monospace;
    }
    .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.09); }
    .login-error { min-height: 22px; color: #ffbdc8; font-size: 13px; }
    .login-hint { margin-top: 18px; color: var(--dim); font-size: 12px; line-height: 1.7; }
    .btn {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 11px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      transition: 0.18s ease;
    }
    .btn:hover { border-color: var(--line-strong); color: var(--primary); background: rgba(0, 240, 255, 0.08); }
    .btn.primary { border-color: transparent; color: #00131a; background: linear-gradient(135deg, var(--blue), var(--primary)); font-weight: 700; }
    .btn.danger { color: #fff; border-color: rgba(255, 61, 90, 0.42); background: rgba(255, 61, 90, 0.14); }
    .btn.small { min-height: 28px; padding: 4px 8px; font-size: 12px; }

    .page {
      min-height: 0;
      flex: 1;
      overflow: hidden;
      padding: 10px 14px 14px;
    }
    .view-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--section-gap);
      min-height: 0;
    }
    .view-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: var(--section-gap);
      overflow: hidden;
    }
    .view-content > .grid,
    .view-content > .panel,
    .view-content > .card,
    .view-content > section {
      min-height: 0;
    }
    .view-content > .panel,
    .view-content > section.panel {
      flex: 1 1 auto;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      flex: 0 0 auto;
    }
    .agent-scope-bar {
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(0, 240, 255, 0.16);
      border-radius: 6px;
      padding: 0 8px;
      background: rgba(7, 19, 32, 0.62);
    }
    .top-actions .agent-scope-bar { min-width: 430px; }
    .agent-scope-main { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
    .agent-scope-main label { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .agent-scope-main .select { min-width: 260px; max-width: 420px; height: 32px; }
    .agent-scope-meta { display: none; }
    @media (max-width: 1200px) {
      .top-actions .agent-scope-bar { min-width: 300px; }
      .agent-scope-main label { display: none; }
      .agent-scope-main .select { min-width: 220px; }
      .brand-core { min-width: 300px; }
    }
    @media (max-width: 820px) {
      .brand-core { min-width: 220px; padding-right: 24px; }
      .brand p { display: none; }
      .top-actions .agent-scope-bar { display: none; }
    }
    .field, .select, .editor {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      color: var(--text);
      background: rgba(9, 18, 29, 0.9);
      outline: none;
    }
    .field, .select { height: 40px; padding: 0 12px; }
    .field:focus, .select:focus, .editor:focus { border-color: var(--line-strong); box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.08); }
    .search { width: 320px; padding-left: 36px; }
    .search-wrap { position: relative; }
    .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }

    .grid { display: grid; gap: var(--layout-gap); min-height: 0; }
    .grid.cards { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.two { grid-template-columns: 1.2fr 0.8fr; }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.side { grid-template-columns: 360px minmax(0, 1fr); }
    .form-grid { display: grid; grid-template-columns: 2fr 1.4fr 0.7fr 0.7fr; gap: 10px; align-items: end; }
    .form-grid label { display: grid; gap: 6px; color: var(--muted); font-size: 12px; }
    .form-grid .field, .form-grid .select { width: 100%; }
    @media (max-width: 1100px) { .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 680px) { .form-grid { grid-template-columns: 1fr; } }
    .asset-layout { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: var(--section-gap); overflow: hidden; }
    .asset-top { flex: 0 0 300px; min-height: 240px; display: grid; grid-template-columns: minmax(360px, 0.9fr) minmax(420px, 1.1fr); gap: var(--layout-gap); }
    .asset-top .panel { min-height: 0; height: 100%; }
    .asset-top .panel-body { padding: 10px 12px; }
    .asset-scan-card .toolbar { min-height: 34px; flex-wrap: wrap; align-items: center; }
    .asset-scan-card .muted { margin: 6px 0 0; }
    .asset-scan-card .form-grid { grid-template-columns: 1.5fr 1.1fr; gap: 8px; }
    .asset-context-card h4 { margin: 8px 0 6px; font-size: 12px; color: var(--muted); }
    .asset-context-card .table-wrap { max-height: 96px; height: auto; }
    .asset-context-card th, .asset-context-card td { padding: 7px 9px; font-size: 12px; }
    .asset-table-card { flex: 0 1 360px !important; max-height: 380px; min-height: 220px !important; }
    .asset-table-card .panel-body { padding: 0; }
    .asset-table-card th, .asset-table-card td { padding: 9px 12px; font-size: 13px; }
    @media (max-width: 1100px) {
      .asset-layout { overflow: auto; }
      .asset-top { flex-basis: auto; min-height: 0; grid-template-columns: 1fr; }
      .asset-top .panel { height: auto; max-height: none; }
      .asset-table-card { max-height: 420px; }
    }
    .overview-page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .overview-page > .grid { min-height: 0; }
    .overview-summary {
      flex: 0 0 auto;
      grid-auto-rows: 100px;
    }
    .overview-summary .card {
      height: 100%;
    }
    .overview-topcharts {
      flex: 0 0 auto;
      height: 320px;
    }
    .overview-topcharts .panel { height: 100%; }
    .overview-topcharts .panel-body {
      overflow: hidden;
      padding: 10px 14px 14px;
    }
    .overview-topcharts .chart {
      height: 100%;
      min-height: 0;
    }
    .trend-fallback {
      width: 100%;
      height: 100%;
      min-height: 220px;
      display: block;
    }
    .trend-empty {
      height: 100%;
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed rgba(0, 240, 255, 0.18);
      border-radius: 8px;
      background: rgba(0, 240, 255, 0.025);
    }
    .risk-list-box {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      justify-content: center;
    }
    .risk-item {
      position: relative;
      min-height: 66px;
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.015)),
        rgba(7, 19, 32, 0.74);
      overflow: hidden;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }
    .risk-item::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      opacity: 0.9;
      transition: width 180ms ease, opacity 180ms ease;
    }
    .risk-item::after {
      content: "";
      position: absolute;
      inset: -45% -18% auto auto;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      opacity: 0.16;
      filter: blur(4px);
      transition: transform 220ms ease, opacity 220ms ease;
    }
    .risk-item:hover {
      transform: translateY(-3px) scale(1.01);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.32), inset 0 0 24px rgba(255, 255, 255, 0.025);
    }
    .risk-item:hover::before { width: 7px; }
    .risk-item:hover::after { transform: scale(1.18) translate(-8px, 6px); opacity: 0.28; }
    .risk-item.type-high::before, .risk-item.type-high::after { background: var(--danger); }
    .risk-item.type-mid::before, .risk-item.type-mid::after { background: var(--warning); }
    .risk-item.type-low::before, .risk-item.type-low::after { background: var(--success); }
    .risk-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.04);
      font-size: 18px;
      z-index: 1;
    }
    .type-high .risk-icon { color: var(--danger); }
    .type-mid .risk-icon { color: var(--warning); }
    .type-low .risk-icon { color: var(--success); }
    .risk-text { min-width: 0; z-index: 1; }
    .risk-title { color: #fff; font-size: 15px; font-weight: 800; letter-spacing: 0.02em; }
    .risk-sub { margin-top: 6px; color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .risk-val-box {
      min-width: 54px;
      text-align: right;
      font-size: 29px;
      line-height: 1;
      font-weight: 800;
      font-family: Consolas, "SFMono-Regular", monospace;
      z-index: 1;
      transition: transform 180ms ease;
    }
    .risk-item:hover .risk-val-box { transform: scale(1.08); }
    .overview-bottomtables {
      flex: 1 1 auto;
      min-height: 0;
    }
    .overview-bottomtables .panel { height: 100%; }
    body.viewport-compact .overview-page {
      gap: 14px;
    }
    body.viewport-compact .overview-topcharts {
      height: 276px;
    }
    body.viewport-compact .overview-summary {
      grid-auto-rows: 92px;
    }
    body.viewport-compact .overview-summary .card {
      height: 100%;
    }
    body.viewport-compact .overview-bottomtables .panel-body {
      padding-top: 10px;
    }
    body.viewport-compact .card {
      height: 92px;
      padding: 12px 14px;
    }
    body.viewport-compact .card h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }
    body.viewport-compact .metric strong {
      font-size: 24px;
    }
    .panel, .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow), inset 0 0 28px rgba(0, 240, 255, 0.025);
      overflow: hidden;
    }
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .card {
      min-height: 0;
      height: 100px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card h3 { margin: 0 0 12px; color: var(--text); font-size: 17px; font-weight: 700; }
    .metric { display: flex; align-items: baseline; gap: 12px; }
    .metric strong { color: #fff; font-size: 28px; line-height: 1; font-weight: 500; letter-spacing: 0; }
    .metric span { border: 1px solid rgba(0, 214, 143, 0.28); border-radius: 4px; color: #8cf2cc; background: rgba(0, 214, 143, 0.08); padding: 2px 6px; font-size: 13px; }
    .metric span.bad { border-color: rgba(255, 61, 90, 0.35); color: #ffb3c0; background: rgba(255, 61, 90, 0.12); }
    .panel-head {
      min-height: 48px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.018);
    }
    .panel-title { margin: 0; color: #fff; font-size: 18px; font-weight: 700; }
    .panel-sub { display: none; }
    .panel-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 12px 14px;
    }
    .chart { height: min(24vh, 250px); min-height: 170px; }

    .table-wrap { height: 100%; max-height: 100%; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid rgba(255, 255, 255, 0.055); padding: 12px 14px; text-align: left; vertical-align: middle; }
    th {
      color: #cbd8df;
      font-weight: 700;
      background: rgba(12, 22, 34, 0.96);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr { transition: 0.15s ease; }
    tbody tr:hover { background: rgba(0, 240, 255, 0.045); }
    .clickable tbody tr { cursor: pointer; }
    .mono { font-family: Consolas, "SFMono-Regular", monospace; }
    .muted { color: var(--muted); }
    .truncate { max-width: 360px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      white-space: nowrap;
    }
    .badge.green { color: #8ff3cc; border-color: rgba(0, 214, 143, 0.35); background: rgba(0, 214, 143, 0.10); }
    .badge.red { color: #ffbdc8; border-color: rgba(255, 61, 90, 0.42); background: rgba(255, 61, 90, 0.14); }
    .badge.yellow { color: #ffe1a1; border-color: rgba(255, 209, 102, 0.42); background: rgba(255, 209, 102, 0.12); }
    .badge.orange { color: #ffc19e; border-color: rgba(255, 138, 61, 0.42); background: rgba(255, 138, 61, 0.12); }
    .badge.blue { color: #b6d6ff; border-color: rgba(75, 158, 255, 0.42); background: rgba(75, 158, 255, 0.12); }

    .split-list { display: grid; gap: 8px; }
    .list-item {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.035);
      cursor: pointer;
    }
    .list-item:hover, .list-item.active { border-color: var(--line-strong); background: rgba(0, 240, 255, 0.08); }
    .timeline { position: relative; display: grid; gap: 12px; margin-left: 10px; padding-left: 20px; border-left: 1px solid var(--line-strong); }
    .timeline-item { position: relative; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 6px; background: rgba(255, 255, 255, 0.035); }
    .timeline-item::before { content: ""; position: absolute; left: -27px; top: 17px; width: 11px; height: 11px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 14px rgba(0, 240, 255, 0.8); }

    .drawer-mask { position: fixed; inset: 0; z-index: 40; display: none; background: rgba(0, 0, 0, 0.45); }
    .drawer-mask.show { display: block; }
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 50;
      width: 620px;
      height: 100%;
      display: none;
      overflow: auto;
      border-left: 1px solid var(--line-strong);
      background: #071320;
      box-shadow: -26px 0 80px rgba(0, 0, 0, 0.52);
    }
    .drawer.show { display: block; }
    .drawer-head { padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; align-items: flex-start; justify-content: space-between; }
    .drawer-title { margin: 0; color: #fff; font-size: 22px; }
    .drawer-body { padding: 18px 20px; display: grid; gap: 14px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tabs button.active { color: #00131a; border-color: transparent; background: linear-gradient(135deg, var(--blue), var(--primary)); font-weight: 700; }
    .kv { display: grid; grid-template-columns: 130px 1fr; gap: 10px 14px; font-size: 14px; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; word-break: break-all; }
    .editor { width: 100%; min-height: 0; height: 100%; padding: 14px; resize: none; color: #d8f7ff; line-height: 1.55; font-family: Consolas, "SFMono-Regular", monospace; overflow: auto; }
    .json { height: 100%; max-height: 100%; overflow: auto; white-space: pre-wrap; word-break: break-word; color: #d4eef8; font-family: Consolas, "SFMono-Regular", monospace; font-size: 12px; }
    .config-board { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .config-card { border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: rgba(11, 21, 34, 0.72); min-height: 0; }
    .config-card.wide { grid-column: 1 / -1; }
    .config-card h3 { margin: 0; color: #fff; font-size: 16px; }
    .config-card p { margin: 7px 0 12px; color: var(--muted); font-size: 12px; line-height: 1.6; }
    .config-list { display: grid; gap: 8px; }
    .config-list-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; }
    .config-list-row .field { width: 100%; }
    .config-list-row.invalid .field { border-color: rgba(255, 61, 90, 0.72); box-shadow: 0 0 0 2px rgba(255, 61, 90, 0.08); }
    .config-add-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; margin-top: 10px; }
    .config-error { min-height: 18px; margin-top: 8px; color: #ffbdc8; font-size: 12px; }
    .ext-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .ext-chip {
      min-width: 66px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }
    .ext-chip:hover { transform: translateY(-2px); border-color: var(--line-strong); }
    .ext-chip.active { color: #00131a; border-color: transparent; background: linear-gradient(135deg, var(--blue), var(--primary)); box-shadow: 0 10px 24px rgba(0, 240, 255, 0.18); }
    .config-select-row { display: grid; grid-template-columns: minmax(0, 1fr); gap: 8px; }
    .upgrade-config-card { flex: 0 0 auto; }
    .view-content > section.config-main-panel { flex: 1 1 0; min-height: 0; }
    .view-content > section.config-main-panel .panel-body { overflow: auto; }
    .view-content > section.upgrade-config-card { flex: 0 0 auto; min-height: 96px; }
    .upgrade-config-card .panel-head { min-height: 42px; padding: 8px 14px; }
    .upgrade-config-card .panel-body { padding: 10px 14px; overflow: visible; }
    .upgrade-box { display: grid; grid-template-columns: minmax(240px, 0.8fr) auto minmax(280px, 1fr); gap: 10px; align-items: center; }
    .upgrade-file { border: 1px dashed rgba(0, 240, 255, 0.36); border-radius: 6px; padding: 8px 10px; background: rgba(0, 240, 255, 0.045); }
    .upgrade-file input { width: 100%; }
    .upgrade-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .upgrade-meta { display: grid; grid-template-columns: 70px minmax(0, 1fr); gap: 5px 10px; font-size: 12px; min-width: 0; }
    .upgrade-meta span:nth-child(odd) { color: var(--muted); }
    .upgrade-meta strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    @media (max-width: 1200px) { .upgrade-box { grid-template-columns: 1fr; } }
    @media (max-width: 1100px) { .config-board { grid-template-columns: 1fr; } }
    .empty { padding: 36px 10px; text-align: center; color: var(--muted); }
    .alert {
      display: none;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 209, 102, 0.32);
      border-radius: 6px;
      padding: 11px 13px;
      color: #ffe1a1;
      background: rgba(255, 209, 102, 0.1);
    }
    .alert.show { display: block; }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 80;
      display: none;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 12px 14px;
      color: var(--primary);
      background: rgba(7, 19, 32, 0.96);
      box-shadow: var(--shadow);
    }
    .toast.show { display: block; }
    .loading { opacity: 0.7; pointer-events: none; }
    #app > .view-shell > .grid.two,
    #app > .view-shell > .grid.cards,
    #app > .view-shell > .grid.three {
      flex: 0 0 auto;
    }

    @media (max-width: 1600px) {
      .nav button { font-size: 11px; gap: 6px; }
      .metric strong { font-size: 24px; }
      .chart { height: min(22vh, 220px); min-height: 150px; }
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { border-radius: 4px; background: rgba(0, 240, 255, 0.22); }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-side">
        <div class="login-bolt"></div>
        <h2>SafeGuard<br>内网敏感文件检测与溯源系统</h2>
        <p>管理员验证通过后进入控制台。所有 Agent、文件、事件、任务与配置数据均来自后端实时接口。</p>
      </div>
      <div class="login-panel">
        <h3>管理员 Token</h3>
        <p>请输入服务端配置的 SAFEGUARD_ADMIN_TOKEN。</p>
        <label class="login-field">
          Token
          <input class="login-input" id="loginTokenInput" type="password" autocomplete="current-password" placeholder="dev-admin-token">
        </label>
        <button class="btn primary" id="loginBtn" style="width:100%;height:46px;">进入系统</button>
        <div class="login-error" id="loginError"></div>
        <div class="login-hint">也支持粘贴 Bearer Token、Authorization: Bearer Token、X-Admin-Token: Token，或 Basic 的 user:password。</div>
      </div>
    </div>
  </section>
  <div class="app locked" id="appShell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-core">
          <div class="brand-mark" aria-hidden="true"><span class="brand-shield"></span></div>
          <div class="brand-copy">
            <h1>SafeGuard</h1>
            <p>内网敏感文件检测与溯源系统</p>
          </div>
        </div>
        <div class="top-actions">
          <div id="topAgentScope"></div>
          <button class="btn primary" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
          <button class="btn" id="logoutBtn">退出</button>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
    </header>
    <main class="page" id="app"></main>
  </div>
  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="drawer"></aside>
  <div class="toast" id="toast"></div>

  <script>
    const API = '/api/v1';
    const TOKEN_KEY = 'safeguard_admin_token';
    const AGENT_SCOPE_KEY = 'safeguard_agent_scope';
    const state = {
      view: location.hash.replace('#/', '') || 'overview',
      loading: false,
      data: {
        agents: [],
        assets: [],
        assetContext: null,
        assetMeta: null,
        files: [],
        sensitive: [],
        rules: [],
        events: [],
        uploads: [],
        tasks: [],
        config: {},
        ocr: null,
        grpc: null,
        upgrades: [],
      },
      sensitiveOnly: false,
      selectedArchiveId: '',
      agentScope: localStorage.getItem(AGENT_SCOPE_KEY) || 'all',
      charts: {},
      authenticated: false,
    };

    const views = [
      ['overview', '总览', 'fa-th-large', '统计卡片、实时趋势与安全态势概览'],
      ['agents', 'Agent管理', 'fa-desktop', '终端 Agent 列表、心跳与状态'],
      ['assets', '资产发现', 'fa-network-wired', '内网主机发现与资产缓存'],
      ['files', '文件监控', 'fa-file-alt', '监控文件、检测状态与风险等级'],
      ['sensitive', '敏感档案', 'fa-shield-alt', '敏感文件历史版本和变更时间线'],
      ['rules', '检测规则', 'fa-exclamation-triangle', '关键字、OCR、LLM 与正则检测规则'],
      ['events', '事件日志', 'fa-list-alt', '上传、扫描、违规等系统事件'],
      ['uploads', '上传会话', 'fa-upload', '文件分片上传会话管理'],
      ['tasks', '任务管理', 'fa-tasks', '失败任务列表与重试'],
      ['runtime', '运行状态', 'fa-microchip', 'OCR 服务和 Agent 升级状态'],
      ['config', '系统配置', 'fa-cog', 'JSON 配置编辑与保存'],
    ];

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? '-').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const arr = (payload) => Array.isArray(payload) ? payload : (payload && Array.isArray(payload.items) ? payload.items : (payload && Array.isArray(payload.assets) ? payload.assets : []));
    const short = (value, len = 18) => {
      const text = String(value || '-');
      return text.length > len ? `${text.slice(0, len)}...${text.slice(-4)}` : text;
    };
    const fmtTime = (value) => {
      if (!value) return '-';
      const n = Number(value);
      const date = Number.isFinite(n) ? new Date(n > 100000000000 ? n : n * 1000) : new Date(value);
      return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString('zh-CN', { hour12: false });
    };
    const fmtSize = (value) => {
      const n = Number(value || 0);
      if (!n) return '-';
      if (n < 1024) return `${n} B`;
      if (n < 1024 ** 2) return `${(n / 1024).toFixed(1)} KB`;
      if (n < 1024 ** 3) return `${(n / 1024 / 1024).toFixed(1)} MB`;
      return `${(n / 1024 / 1024 / 1024).toFixed(2)} GB`;
    };
    const json = (value) => `<pre class="json">${escapeHtml(JSON.stringify(value, null, 2))}</pre>`;
    const statusClass = (value) => {
      const v = String(value || '').toLowerCase();
      if (['online', 'ok', 'success', 'completed', 'clean', 'enabled', '启用'].some(x => v.includes(x))) return 'green';
      if (['failed', 'error', 'offline', 'deleted', 'critical', '禁用'].some(x => v.includes(x))) return 'red';
      if (['pending', 'uploading', 'created', 'running', 'warning', 'queued'].some(x => v.includes(x))) return 'yellow';
      return 'blue';
    };
    const badge = (value, label) => `<span class="badge ${statusClass(value)}">${escapeHtml(label || value || '-')}</span>`;
    const boolBadge = (value, yes = '是', no = '否') => badge(value ? 'ok' : 'error', value ? yes : no);
    const valueOrDash = (value) => value === undefined || value === null || value === '' ? '-' : value;
    const firstValue = (...values) => {
      for (const value of values) {
        if (value !== undefined && value !== null && value !== '') return value;
      }
      return '-';
    };
    const errorSummary = (payload) => {
      if (!payload) return '-';
      const value = payload.error || payload.init_error || payload.detail || payload.message || (payload.health && (payload.health.error || payload.health.init_error));
      return valueOrDash(value);
    };
    const missingItemsSummary = (items) => {
      const list = Array.isArray(items) ? items : [];
      if (!list.length) return '无';
      return list.slice(0, 4).join('；') + (list.length > 4 ? `；等 ${list.length} 项` : '');
    };
    const riskBadge = (value) => {
      const v = String(value || '').toLowerCase();
      if (v.includes('critical') || v.includes('严重')) return '<span class="badge red">严重</span>';
      if (v.includes('high') || v.includes('高')) return '<span class="badge red">高危</span>';
      if (v.includes('medium') || v.includes('中')) return '<span class="badge orange">中危</span>';
      if (v.includes('low') || v.includes('低')) return '<span class="badge yellow">低危</span>';
      return '<span class="badge green">安全</span>';
    };

    function currentToken() {
      const input = $('loginTokenInput');
      return ((input && input.value) || localStorage.getItem(TOKEN_KEY) || '').trim();
    }

    function authHeaders() {
      let token = currentToken();
      if (!token) return {};
      const headers = {};
      token = token.replace(/^authorization\s*:\s*/i, '').replace(/^x-admin-token\s*:\s*/i, '');
      if (/^basic\s+/i.test(token) || /^bearer\s+/i.test(token)) {
        headers.Authorization = token;
        if (/^bearer\s+/i.test(token)) headers['X-Admin-Token'] = token.replace(/^bearer\s+/i, '').trim();
      } else if (/^[^:\s]+:[^\s]+$/.test(token)) {
        headers.Authorization = `Basic ${btoa(unescape(encodeURIComponent(token)))}`;
      } else {
        headers.Authorization = `Bearer ${token}`;
        headers['X-Admin-Token'] = token;
      }
      return headers;
    }

    async function request(path, options = {}) {
      const headers = Object.assign({}, authHeaders(), options.headers || {});
      const res = await fetch(`${API}${path}`, Object.assign({}, options, { headers }));
      if (res.status === 401) {
        const error = new Error('管理接口需要有效的管理员 Token。');
        error.status = 401;
        throw error;
      }
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${path}`);
      if (res.status === 204) return null;
      return res.json();
    }

    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.add('show');
      window.clearTimeout(toast.timer);
      toast.timer = window.setTimeout(() => el.classList.remove('show'), 2600);
    }

    function setLoading(value) {
      state.loading = value;
      $('app').classList.toggle('loading', value);
    }

    function initNav() {
      $('nav').innerHTML = views.map(([id, label, icon]) => `
        <button data-view="${id}" class="${state.view === id ? 'active' : ''}">
          <i class="fas ${icon}"></i>${label}
        </button>
      `).join('');
      $('nav').style.setProperty('--nav-count', String(views.length));
      $('nav').addEventListener('click', (event) => {
        const btn = event.target.closest('button[data-view]');
        if (!btn) return;
        switchView(btn.dataset.view);
      });
      $('refreshBtn').addEventListener('click', () => loadView(true));
      $('logoutBtn').addEventListener('click', logout);
      renderTopAgentScope();
    }

    function renderTopAgentScope() {
      const host = $('topAgentScope');
      if (!host) return;
      host.innerHTML = agentScopeBar();
    }

    function initLogin() {
      $('loginTokenInput').value = localStorage.getItem(TOKEN_KEY) || '';
      $('loginBtn').addEventListener('click', login);
      $('loginTokenInput').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') login();
      });
      if (currentToken()) login(true);
      else showLogin();
    }

    function showLogin(message = '') {
      state.authenticated = false;
      $('appShell').classList.add('locked');
      $('loginScreen').classList.remove('hidden');
      $('loginError').textContent = message;
      setTimeout(() => $('loginTokenInput').focus(), 0);
    }

    function showApp() {
      state.authenticated = true;
      $('loginScreen').classList.add('hidden');
      $('appShell').classList.remove('locked');
    }

    async function login(silent = false) {
      const token = currentToken();
      if (!token) {
        showLogin('请输入管理员 Token。');
        return;
      }
      $('loginBtn').disabled = true;
      $('loginError').textContent = silent ? '' : '正在验证 Token...';
      try {
        await request('/admin/agents');
        localStorage.setItem(TOKEN_KEY, token);
        showApp();
        await loadView(true);
        if (!silent) toast('Token 验证成功');
      } catch (error) {
        localStorage.removeItem(TOKEN_KEY);
        showLogin('Token 验证失败：' + (error.message || error));
      } finally {
        $('loginBtn').disabled = false;
      }
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      state.data = { agents: [], assets: [], assetContext: null, assetMeta: null, files: [], sensitive: [], rules: [], events: [], uploads: [], tasks: [], config: {}, ocr: null, grpc: null, upgrades: [] };
      showLogin('已退出，请重新输入管理员 Token。');
    }

    function switchView(view) {
      state.view = view;
      location.hash = `/${view}`;
      document.querySelectorAll('.nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
      loadView();
    }

    function currentAgent() {
      if (!state.agentScope || state.agentScope === 'all') return null;
      return state.data.agents.find(agent => String(agent.agent_id) === String(state.agentScope)) || null;
    }

    function agentLabel(agent) {
      if (!agent) return '全部 Agent';
      return `${agent.hostname || 'unknown'} · ${agent.ip || '-'} · ${short(agent.agent_id, 14)}`;
    }

    function agentScopeBar() {
      const agents = state.data.agents || [];
      if (state.agentScope !== 'all' && !agents.some(agent => String(agent.agent_id) === String(state.agentScope))) {
        state.agentScope = 'all';
        localStorage.setItem(AGENT_SCOPE_KEY, 'all');
      }
      const selected = currentAgent();
      const online = agents.filter(agent => String(agent.status).toUpperCase() === 'ONLINE').length;
      const meta = selected
        ? `${selected.status || '-'} · ${selected.agent_version || '-'} · 最近心跳 ${fmtTime(selected.last_heartbeat)}`
        : `${online} 在线 / ${agents.length} 总数`;
      return `<div class="agent-scope-bar">
        <div class="agent-scope-main">
          <label for="agentScopeSelect">查看范围</label>
          <select class="select" id="agentScopeSelect" onchange="setAgentScopeFromSelect(this.value)">
            <option value="all" ${state.agentScope === 'all' ? 'selected' : ''}>全部 Agent</option>
            ${agents.map(agent => `<option value="${escapeHtml(agent.agent_id)}" ${String(state.agentScope) === String(agent.agent_id) ? 'selected' : ''}>${escapeHtml(agentLabel(agent))}</option>`).join('')}
          </select>
          ${state.agentScope !== 'all' ? '<button class="btn small" id="clearAgentScope" onclick="setAgentScopeFromSelect(\'all\')">清除筛选</button>' : ''}
        </div>
        <div class="agent-scope-meta">${escapeHtml(meta)}</div>
      </div>`;
    }

    function bindAgentScopeBar() {
      const select = $('agentScopeSelect');
      if (!select) return;
      select.addEventListener('change', async () => {
        state.agentScope = select.value || 'all';
        localStorage.setItem(AGENT_SCOPE_KEY, state.agentScope);
        state.selectedArchiveId = '';
        await loadView(false);
      });
      const clear = $('clearAgentScope');
      if (clear) clear.addEventListener('click', async () => {
        state.agentScope = 'all';
        localStorage.setItem(AGENT_SCOPE_KEY, 'all');
        state.selectedArchiveId = '';
        await loadView(false);
      });
    }

    async function setAgentScopeFromSelect(value) {
      state.agentScope = value || 'all';
      localStorage.setItem(AGENT_SCOPE_KEY, state.agentScope);
      state.selectedArchiveId = '';
      await loadView(false);
    }
    window.setAgentScopeFromSelect = setAgentScopeFromSelect;

    function rowHasAgent(row, agentId = state.agentScope) {
      if (!agentId || agentId === 'all') return true;
      const target = String(agentId);
      if (!row) return false;
      if (String(row.agent_id || '') === target) return true;
      if (Array.isArray(row.agents) && row.agents.some(item => String(item) === target)) return true;
      const payload = row.task_payload || row.payload || row.raw_event_json || row.event_details || {};
      if (payload && typeof payload === 'object' && JSON.stringify(payload).includes(target)) return true;
      return false;
    }

    function scopedRows(rows) {
      return (rows || []).filter(row => rowHasAgent(row));
    }

    async function ensureAgents(force = false) {
      if (force || !state.data.agents.length) state.data.agents = arr(await request('/admin/agents'));
      if (state.agentScope !== 'all' && !state.data.agents.some(agent => String(agent.agent_id) === String(state.agentScope))) {
        state.agentScope = 'all';
        localStorage.setItem(AGENT_SCOPE_KEY, 'all');
      }
      renderTopAgentScope();
    }

    function shell(title, desc, content, toolbar = '') {
      return `
        <div class="view-shell">
          <div class="alert" id="alert"></div>
          ${toolbar ? `<div class="toolbar">${toolbar}</div>` : ''}
          <div class="view-content">${content}</div>
        </div>
      `;
    }

    function showError(error) {
      if (error && error.status === 401) {
        localStorage.removeItem(TOKEN_KEY);
        showLogin('Token 已失效或无权限，请重新输入。');
        return;

    function overviewRiskCounts(files) {
      const counts = { high: 0, mid: 0, low: 0 };
      files.forEach(f => {
        const risk = String(f.risk_level || '').toLowerCase();
        const status = String(f.detection_status || '').toLowerCase();
        const sensitive = !!f.is_sensitive;
        if (sensitive && (risk.includes('critical') || risk.includes('high') || risk.includes('严重') || risk.includes('高'))) counts.high += 1;
        else if (sensitive && (risk.includes('medium') || risk.includes('中') || status.includes('pending') || status.includes('checking'))) counts.mid += 1;
        else counts.low += 1;
      });
      return counts;
    }

            </div>

        </div>
      `;

    function bucketTimestamp(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n) || n <= 0) return 0;
      return n > 100000000000 ? n : n * 1000;
    }

    function addTrendPoint(buckets, timestamp, key) {
      const t = bucketTimestamp(timestamp);
      if (!t) return;
      const now = Date.now();
      const idx = buckets.length - 1 - Math.floor((now - t) / (2 * 3600 * 1000));
      if (idx < 0 || idx >= buckets.length) return;
      buckets[idx][key] += 1;
    }

    function buildTrendBuckets(source = {}) {
      const buckets = [];
      const now = Date.now();
      for (let i = 11; i >= 0; i--) {
        const d = new Date(now - i * 2 * 3600 * 1000);
        buckets.push({ label: `${String(d.getHours()).padStart(2, '0')}:00`, event: 0, upload: 0, violation: 0 });
      }
      const events = Array.isArray(source) ? source : arr(source.events);
      const uploads = Array.isArray(source) ? [] : arr(source.uploads);
      const files = Array.isArray(source) ? [] : arr(source.files);
      const sensitive = Array.isArray(source) ? [] : arr(source.sensitive);
      events.forEach(e => {
        const type = String(e.event_type || '').toLowerCase();
        addTrendPoint(buckets, e.timestamp || e.created_at, 'event');
        if (type.includes('upload')) addTrendPoint(buckets, e.timestamp || e.created_at, 'upload');
        if (type.includes('violation') || type.includes('sensitive') || type.includes('rule')) addTrendPoint(buckets, e.timestamp || e.created_at, 'violation');
      });
      uploads.forEach(item => {
        addTrendPoint(buckets, item.updated_at || item.created_at || item.expires_at, 'upload');
      });
      files.filter(item => item.is_sensitive || String(item.detection_status || '').toUpperCase() === 'SENSITIVE').forEach(item => {
        addTrendPoint(buckets, item.updated_at || item.created_at, 'violation');
      });
      sensitive.forEach(item => {
        addTrendPoint(buckets, item.last_seen_at || item.first_seen_at, 'violation');
      });
      return buckets;
    }

    function drawTrend(source) {
      const el = $('trendChart');
      if (!el) return;
      const buckets = buildTrendBuckets(source || {});
      if (!window.echarts) {
        drawTrendFallback(el, buckets);
        return;
      }
      if (state.charts.trend && state.charts.trend.dispose) {
        try { state.charts.trend.dispose(); } catch (_) {}
      }
      el.innerHTML = '';
      const chart = echarts.init(el);
      chart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis' },
        legend: { top: 0, textStyle: { color: '#8296a7' } },
        grid: { left: 38, right: 20, top: 42, bottom: 30 },
        xAxis: { type: 'category', data: buckets.map(b => b.label), axisLabel: { color: '#8296a7' }, axisLine: { lineStyle: { color: 'rgba(0,240,255,.22)' } } },
        yAxis: { type: 'value', axisLabel: { color: '#8296a7' }, splitLine: { lineStyle: { color: 'rgba(0,240,255,.08)' } } },
        series: [
          { name: '事件', type: 'line', smooth: true, data: buckets.map(b => b.event), itemStyle: { color: '#00f0ff' }, areaStyle: { color: 'rgba(0,240,255,.12)' } },
          { name: '上传', type: 'line', smooth: true, data: buckets.map(b => b.upload), itemStyle: { color: '#4b9eff' }, areaStyle: { color: 'rgba(75,158,255,.10)' } },
          { name: '违规', type: 'line', smooth: true, data: buckets.map(b => b.violation), itemStyle: { color: '#ff3d5a' }, areaStyle: { color: 'rgba(255,61,90,.10)' } },
        ],
      });
      state.charts.trend = chart;
    }

    function drawTrendFallback(el, buckets) {
      const width = Math.max(640, el.clientWidth || 640);
      const height = Math.max(220, el.clientHeight || 220);
      const pad = { left: 40, right: 18, top: 24, bottom: 34 };
      const maxVal = Math.max(1, ...buckets.flatMap(b => [b.event, b.upload, b.violation]));
      const x = index => pad.left + (index * (width - pad.left - pad.right)) / Math.max(1, buckets.length - 1);
      const y = value => height - pad.bottom - (Number(value || 0) * (height - pad.top - pad.bottom)) / maxVal;
      const pathFor = key => buckets.map((b, index) => `${index ? 'L' : 'M'}${x(index).toFixed(1)},${y(b[key]).toFixed(1)}`).join(' ');
      const areaFor = key => `${pathFor(key)} L${x(buckets.length - 1).toFixed(1)},${height - pad.bottom} L${x(0).toFixed(1)},${height - pad.bottom} Z`;
      const gridLines = [0, 0.25, 0.5, 0.75, 1].map(ratio => {
        const gy = pad.top + ratio * (height - pad.top - pad.bottom);
        return `<line x1="${pad.left}" y1="${gy.toFixed(1)}" x2="${width - pad.right}" y2="${gy.toFixed(1)}" stroke="rgba(0,240,255,.08)"/>`;
      }).join('');
      const labels = buckets.map((b, index) => index % 2 ? '' : `<text x="${x(index).toFixed(1)}" y="${height - 10}" fill="#8296a7" font-size="11" text-anchor="middle">${escapeHtml(b.label)}</text>`).join('');
      el.innerHTML = buckets.length ? `
        <svg class="trend-fallback" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-label="实时趋势">
          <rect width="${width}" height="${height}" fill="transparent"/>
          ${gridLines}
          <path d="${areaFor('event')}" fill="rgba(0,240,255,.10)"></path>
          <path d="${areaFor('upload')}" fill="rgba(75,158,255,.08)"></path>
          <path d="${areaFor('violation')}" fill="rgba(255,61,90,.08)"></path>
          <path d="${pathFor('event')}" fill="none" stroke="#00f0ff" stroke-width="2.5"/>
          <path d="${pathFor('upload')}" fill="none" stroke="#4b9eff" stroke-width="2.5"/>
          <path d="${pathFor('violation')}" fill="none" stroke="#ff3d5a" stroke-width="2.5"/>
          ${labels}
          <g font-size="12">
            <circle cx="${pad.left}" cy="12" r="4" fill="#00f0ff"/><text x="${pad.left + 10}" y="16" fill="#8296a7">事件</text>
            <circle cx="${pad.left + 62}" cy="12" r="4" fill="#4b9eff"/><text x="${pad.left + 72}" y="16" fill="#8296a7">上传</text>
            <circle cx="${pad.left + 124}" cy="12" r="4" fill="#ff3d5a"/><text x="${pad.left + 134}" y="16" fill="#8296a7">违规</text>
          </g>
        </svg>
      ` : '<div class="trend-empty">暂无趋势数据</div>';
    }

    async function renderAgents(force) {
      if (force || !state.data.agents.length) state.data.agents = arr(await request('/admin/agents'));
      const toolbar = `<div class="search-wrap"><i class="fas fa-search"></i><input class="field search" id="agentSearch" placeholder="搜索 ID / 主机名 / IP"></div><select class="select" id="agentStatus"><option value="">全部状态</option><option value="ONLINE">在线</option><option value="OFFLINE">离线</option></select>`;

      $('app').innerHTML = shell('资产发现', '展示服务器本机可达范围内的资产探测结果、网卡上下文和候选扫描网段。', assetPanel(state.data.assets, state.data.assetContext, state.data.assetMeta), toolbar);

    function assetPanel(rows, context = {}, meta = {}) {

    function assetScanForm(context = {}, meta = {}) {
      const defaultTargets = (context.candidate_networks || []).filter(n => n.scan_allowed).map(n => n.cidr).join(', ');
      const lastTargets = ((meta && meta.scan_targets) || []).join(', ');
      const ports = ((meta && meta.ports) || [22, 53, 80, 135, 139, 161, 443, 445, 3389, 5985, 8080, 8443, 9100]).join(',');

      `;

    async function runAssetDiscoveryFromForm() {
      const targets = parseList(($('assetTargets') || {}).value || '');
      const ports = parsePorts(($('assetPorts') || {}).value || '');
      const timeout = Math.max(5, Math.min(300, Number(($('assetTimeout') || {}).value || 60)));
      const payloadBody = {
        mode: (($('assetMode') || {}).value || 'auto'),
        targets: targets.length ? targets : null,
        include_port_scan: Boolean(($('assetIncludePorts') || {}).checked),
        include_os_detect: Boolean(($('assetIncludeOs') || {}).checked),
        timeout,
        ports,
      };
      setLoading(true);
      try {
        const payload = await request('/assets/discover', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadBody),
        });
        payload.scan_targets = targets;
        payload.timeout = timeout;
        state.data.assetMeta = payload;
        state.data.assetContext = {
          platform: payload.platform,
          local_interfaces: payload.local_interfaces || [],
          route_table: payload.route_table || [],
          extra_networks: payload.extra_networks || [],
          candidate_networks: payload.candidate_networks || [],
          warnings: payload.warnings || [],
          errors: payload.errors || [],
        };
        state.data.assets = arr(payload);
        await renderAssets(false);
        toast('资产发现已完成');
      } finally { setLoading(false); }
    }
    function parseList(value) {
      return String(value || '').split(/[,\s;，；]+/).map(v => v.trim()).filter(Boolean);
    }
    function parsePorts(value) {
      return [...new Set(parseList(value).map(v => Number(v)).filter(v => Number.isInteger(v) && v >= 1 && v <= 65535))];
    }
    function assetContextPanel(context = {}, meta = {}) {
      const interfaces = context.local_interfaces || [];
      const networks = context.candidate_networks || [];
      const notices = [...(context.warnings || []), ...((meta && meta.warnings) || []), ...(context.errors || []), ...((meta && meta.errors) || [])];
      const ifaceRows = interfaces.length ? interfaces.map(item => `<tr><td>${escapeHtml(item.interface)}</td><td>${escapeHtml(item.ip || item.ipv4)}</td><td>${escapeHtml(item.cidr)}</td><td>${escapeHtml(item.gateway || '-')}</td><td>${escapeHtml(item.interface_type || '-')}</td></tr>`).join('') : `<tr><td colspan="5" class="empty">暂无网卡上下文</td></tr>`;
      const networkRows = networks.length ? networks.map(item => `<tr><td>${escapeHtml(item.cidr)}</td><td>${escapeHtml(item.source_interface)}</td><td>${escapeHtml(item.reason)}</td><td>${badge(item.scan_allowed ? 'allowed' : 'skipped', item.scan_allowed ? '允许' : '跳过')}</td><td>${escapeHtml(item.estimated_hosts)}</td></tr>`).join('') : `<tr><td colspan="5" class="empty">暂无候选网段</td></tr>`;
      const notice = notices.length ? `<div class="alert show">${notices.map(escapeHtml).join('<br>')}</div>` : '';
      return `
        <section class="panel asset-context-card">
          <div class="panel-head"><h3 class="panel-title">探测上下文 · ${escapeHtml(context.platform || (meta && meta.platform) || '-')}</h3></div>
          <div class="panel-body">
            ${notice}
            <h4>本机网卡</h4>

      document.querySelectorAll('[data-archive-download]').forEach(btn => btn.addEventListener('click', async (event) => {
        event.stopPropagation();

          await downloadArchiveArtifact(btn.dataset.trackedId, btn.dataset.versionId, btn.dataset.artifact, btn.dataset.filename);

          toast(error.message || '下载失败');
        }

    function archiveDownloadButtons(trackedId, version) {
      const buttons = [];
      const baseName = safeDownloadName(version.name_at_that_time || version.path_at_that_time || version.version_id);
      if (version.can_download !== false) buttons.push(downloadButton(trackedId, version.version_id, 'source', `下载原文件`, archiveArtifactFilename(baseName, version.version_no, 'source')));
      if (version.has_highlight) buttons.push(downloadButton(trackedId, version.version_id, 'highlight', `下载高亮文件`, archiveArtifactFilename(baseName, version.version_no, 'highlight')));
      if (Number(version.version_no || 0) > 1 && version.has_diff) buttons.push(downloadButton(trackedId, version.version_id, 'diff', `下载差异文件`, archiveArtifactFilename(baseName, version.version_no, 'diff')));
      return buttons.join('') || '<span class="muted">无可下载归档</span>';
    }

    function safeDownloadName(value) {
      const text = String(value || 'archive').split(/[\\/]/).pop() || 'archive';
      return text.replace(/[<>:"|?*]+/g, '_');
    }

    function archiveArtifactFilename(baseName, versionNo, artifact) {
      const clean = safeDownloadName(baseName);
      const dot = clean.lastIndexOf('.');
      const stem = dot > 0 ? clean.slice(0, dot) : clean;
      const ext = dot > 0 ? clean.slice(dot) : '';
      const version = `V${Number(versionNo || 0) || 1}`;
      if (artifact === 'diff') return `${stem}_${version}_差异.json`;
      if (artifact === 'highlight') return `${stem}_${version}_高亮${ext || '.bin'}`;
      return `${stem}_${version}${ext || '.bin'}`;
    }

    function downloadButton(trackedId, versionId, artifact, label, filename) {
      return `<button class="btn small" data-archive-download="1" data-tracked-id="${escapeHtml(trackedId)}" data-version-id="${escapeHtml(versionId)}" data-artifact="${escapeHtml(artifact)}" data-filename="${escapeHtml(filename || versionId)}"><i class="fas fa-download"></i>${label}</button>`;
    }

    async function downloadArchiveArtifact(trackedId, versionId, artifact, filename) {
      const suffix = artifact === 'highlight' ? '/download-highlight' : artifact === 'diff' ? '/download-diff' : '/download';
      const res = await fetch(`${API}/sensitive-files/${encodeURIComponent(trackedId)}/versions/${encodeURIComponent(versionId)}${suffix}`, { headers: authHeaders() });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}: 下载失败`);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename || filenameFromContentDisposition(res.headers.get('content-disposition')) || versionId;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast('归档文件下载已开始');
    }

    function filenameFromContentDisposition(value) {
      const header = String(value || '');
      const encoded = header.match(/filename\*=UTF-8''([^;]+)/i);
      if (encoded) {
        try { return safeDownloadName(decodeURIComponent(encoded[1])); } catch (_) {}
      }
      const plain = header.match(/filename="?([^";]+)"?/i);
      return plain ? safeDownloadName(plain[1]) : '';
    }
