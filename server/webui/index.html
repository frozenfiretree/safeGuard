<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>SafeGuard 内网敏感文件检测与溯源系统</title>
  <link href="/static/css/all.min.css" rel="stylesheet">
  <script src="/static/js/echarts.js"></script>
  <style>
    :root {
      --bg: #050a15;
      --panel: rgba(11, 21, 34, 0.84);
      --panel-2: rgba(15, 28, 43, 0.76);
      --panel-3: rgba(21, 35, 50, 0.66);
      --line: rgba(0, 240, 255, 0.18);
      --line-strong: rgba(0, 240, 255, 0.42);
      --text: #d8e7ef;
      --muted: #8296a7;
      --dim: #516474;
      --primary: #00f0ff;
      --blue: #4b9eff;
      --green: #00d68f;
      --yellow: #ffd166;
      --orange: #ff8a3d;
      --red: #ff3d5a;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
      --layout-gap: 14px;
      --section-gap: 14px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      min-width: 0;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(5, 10, 21, 0.96), rgba(5, 10, 21, 0.99)),
        repeating-linear-gradient(90deg, rgba(0, 240, 255, 0.035) 0 1px, transparent 1px 88px),
        repeating-linear-gradient(0deg, rgba(75, 158, 255, 0.025) 0 1px, transparent 1px 88px),
        var(--bg);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    #particle-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .app { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }
    .app.locked { display: none; }
    .topbar {
      min-height: 122px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 22px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 12, 23, 0.92);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 38px rgba(0, 0, 0, 0.35);
    }
    .brand { width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; position: relative; }
    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #00131a;
      font-weight: 900;
      font-size: 22px;
      background: linear-gradient(135deg, var(--blue), var(--primary));
      box-shadow: 0 0 24px rgba(0, 240, 255, 0.32);
    }
    .brand h1 { margin: 0; font-size: 18px; line-height: 1.1; color: #fff; }
    .brand p { margin: 5px 0 0; font-size: 12px; color: var(--muted); }
    .nav {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(var(--nav-count, 10), minmax(0, 1fr));
      align-items: stretch;
      gap: 10px;
      overflow: visible;
    }
    .nav button {
      width: 100%;
      min-width: 0;
      height: 36px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      background: transparent;
      white-space: nowrap;
      transition: 0.18s ease;
      font-size: 12px;
    }
    .nav button:hover { color: var(--primary); background: rgba(0, 240, 255, 0.08); border-color: var(--line); }
    .nav button.active { color: var(--primary); background: rgba(0, 240, 255, 0.12); border-color: var(--line-strong); box-shadow: inset 0 0 18px rgba(0, 240, 255, 0.06); }
    .top-actions { position: absolute; right: 0; top: 4px; display: flex; align-items: center; gap: 10px; }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 16%, rgba(0, 240, 255, 0.13), transparent 34%),
        rgba(5, 10, 21, 0.82);
      backdrop-filter: blur(8px);
    }
    .login-screen.hidden { display: none; }
    .login-card {
      width: min(920px, 100%);
      min-height: 520px;
      display: grid;
      grid-template-columns: 0.82fr 1fr;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(7, 19, 32, 0.94);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.62), inset 0 0 36px rgba(0, 240, 255, 0.035);
      overflow: hidden;
    }
    .login-side {
      padding: 42px 34px;
      border-right: 1px solid rgba(0, 240, 255, 0.16);
      background: rgba(0, 0, 0, 0.18);
    }
    .login-bolt {
      width: 54px;
      height: 72px;
      margin-bottom: 28px;
      background: linear-gradient(180deg, #d9fbff, var(--primary));
      clip-path: polygon(55% 0, 7% 60%, 42% 60%, 30% 100%, 95% 39%, 58% 39%);
      box-shadow: 0 0 28px rgba(0, 240, 255, 0.62);
    }
    .login-side h2 { margin: 0; color: #fff; font-size: 28px; line-height: 1.25; }
    .login-side p { margin: 14px 0 0; color: var(--muted); line-height: 1.7; }
    .login-panel { padding: 54px 44px; display: flex; flex-direction: column; justify-content: center; }
    .login-panel h3 { margin: 0; color: #fff; font-size: 24px; }
    .login-panel p { margin: 10px 0 28px; color: var(--muted); }
    .login-field { display: grid; gap: 8px; margin-bottom: 18px; color: var(--primary); font-size: 13px; }
    .login-input {
      height: 46px;
      width: 100%;
      border: 1px solid rgba(0, 240, 255, 0.26);
      border-left: 3px solid var(--primary);
      border-radius: 4px;
      padding: 0 14px;
      color: #fff;
      background: rgba(0, 0, 0, 0.24);
      outline: none;
      font-family: Consolas, "SFMono-Regular", monospace;
    }
    .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.09); }
    .login-error { min-height: 22px; color: #ffbdc8; font-size: 13px; }
    .login-hint { margin-top: 18px; color: var(--dim); font-size: 12px; line-height: 1.7; }
    .btn {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 11px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      transition: 0.18s ease;
    }
    .btn:hover { border-color: var(--line-strong); color: var(--primary); background: rgba(0, 240, 255, 0.08); }
    .btn.primary { border-color: transparent; color: #00131a; background: linear-gradient(135deg, var(--blue), var(--primary)); font-weight: 700; }
    .btn.danger { color: #fff; border-color: rgba(255, 61, 90, 0.42); background: rgba(255, 61, 90, 0.14); }
    .btn.small { min-height: 28px; padding: 4px 8px; font-size: 12px; }

    .page {
      min-height: 0;
      flex: 1;
      overflow: hidden;
      padding: 10px 14px 14px;
    }
    .view-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--section-gap);
      min-height: 0;
    }
    .view-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: var(--section-gap);
      overflow: hidden;
    }
    .view-content > .grid,
    .view-content > .panel,
    .view-content > .card,
    .view-content > section {
      min-height: 0;
    }
    .view-content > .panel,
    .view-content > section.panel {
      flex: 1 1 auto;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      flex: 0 0 auto;
    }
    .field, .select, .editor {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      color: var(--text);
      background: rgba(9, 18, 29, 0.9);
      outline: none;
    }
    .field, .select { height: 40px; padding: 0 12px; }
    .field:focus, .select:focus, .editor:focus { border-color: var(--line-strong); box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.08); }
    .search { width: 320px; padding-left: 36px; }
    .search-wrap { position: relative; }
    .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }

    .grid { display: grid; gap: var(--layout-gap); min-height: 0; }
    .grid.cards { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.two { grid-template-columns: 1.2fr 0.8fr; }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.side { grid-template-columns: 360px minmax(0, 1fr); }
    .overview-page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .overview-page > .grid { min-height: 0; }
    .overview-topcharts {
      flex: 0 0 auto;
      height: 320px;
    }
    .overview-topcharts .panel { height: 100%; }
    .overview-topcharts .panel-body {
      overflow: hidden;
      padding: 10px 14px 14px;
    }
    .overview-topcharts .chart {
      height: 100%;
      min-height: 0;
    }
    .overview-bottomtables {
      flex: 1 1 auto;
      min-height: 0;
    }
    .overview-bottomtables .panel { height: 100%; }
    body.viewport-compact .overview-page {
      gap: 14px;
    }
    body.viewport-compact .overview-topcharts {
      height: 276px;
    }
    body.viewport-compact .overview-bottomtables .panel-body {
      padding-top: 10px;
    }
    body.viewport-compact .card {
      height: 92px;
      padding: 12px 14px;
    }
    body.viewport-compact .card h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }
    body.viewport-compact .metric strong {
      font-size: 24px;
    }
    .panel, .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow), inset 0 0 28px rgba(0, 240, 255, 0.025);
      overflow: hidden;
    }
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .card {
      min-height: 0;
      height: 100px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card h3 { margin: 0 0 12px; color: var(--text); font-size: 17px; font-weight: 700; }
    .metric { display: flex; align-items: baseline; gap: 12px; }
    .metric strong { color: #fff; font-size: 28px; line-height: 1; font-weight: 500; letter-spacing: 0; }
    .metric span { border: 1px solid rgba(0, 214, 143, 0.28); border-radius: 4px; color: #8cf2cc; background: rgba(0, 214, 143, 0.08); padding: 2px 6px; font-size: 13px; }
    .metric span.bad { border-color: rgba(255, 61, 90, 0.35); color: #ffb3c0; background: rgba(255, 61, 90, 0.12); }
    .panel-head {
      min-height: 48px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.018);
    }
    .panel-title { margin: 0; color: #fff; font-size: 18px; font-weight: 700; }
    .panel-sub { display: none; }
    .panel-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 12px 14px;
    }
    .chart { height: min(24vh, 250px); min-height: 170px; }

    .table-wrap { height: 100%; max-height: 100%; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid rgba(255, 255, 255, 0.055); padding: 12px 14px; text-align: left; vertical-align: middle; }
    th {
      color: #cbd8df;
      font-weight: 700;
      background: rgba(12, 22, 34, 0.96);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr { transition: 0.15s ease; }
    tbody tr:hover { background: rgba(0, 240, 255, 0.045); }
    .clickable tbody tr { cursor: pointer; }
    .mono { font-family: Consolas, "SFMono-Regular", monospace; }
    .muted { color: var(--muted); }
    .truncate { max-width: 360px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      white-space: nowrap;
    }
    .badge.green { color: #8ff3cc; border-color: rgba(0, 214, 143, 0.35); background: rgba(0, 214, 143, 0.10); }
    .badge.red { color: #ffbdc8; border-color: rgba(255, 61, 90, 0.42); background: rgba(255, 61, 90, 0.14); }
    .badge.yellow { color: #ffe1a1; border-color: rgba(255, 209, 102, 0.42); background: rgba(255, 209, 102, 0.12); }
    .badge.orange { color: #ffc19e; border-color: rgba(255, 138, 61, 0.42); background: rgba(255, 138, 61, 0.12); }
    .badge.blue { color: #b6d6ff; border-color: rgba(75, 158, 255, 0.42); background: rgba(75, 158, 255, 0.12); }

    .split-list { display: grid; gap: 8px; }
    .list-item {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.035);
      cursor: pointer;
    }
    .list-item:hover, .list-item.active { border-color: var(--line-strong); background: rgba(0, 240, 255, 0.08); }
    .timeline { position: relative; display: grid; gap: 12px; margin-left: 10px; padding-left: 20px; border-left: 1px solid var(--line-strong); }
    .timeline-item { position: relative; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 6px; background: rgba(255, 255, 255, 0.035); }
    .timeline-item::before { content: ""; position: absolute; left: -27px; top: 17px; width: 11px; height: 11px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 14px rgba(0, 240, 255, 0.8); }

    .drawer-mask { position: fixed; inset: 0; z-index: 40; display: none; background: rgba(0, 0, 0, 0.45); }
    .drawer-mask.show { display: block; }
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 50;
      width: 620px;
      height: 100%;
      display: none;
      overflow: auto;
      border-left: 1px solid var(--line-strong);
      background: #071320;
      box-shadow: -26px 0 80px rgba(0, 0, 0, 0.52);
    }
    .drawer.show { display: block; }
    .drawer-head { padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; align-items: flex-start; justify-content: space-between; }
    .drawer-title { margin: 0; color: #fff; font-size: 22px; }
    .drawer-body { padding: 18px 20px; display: grid; gap: 14px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tabs button.active { color: #00131a; border-color: transparent; background: linear-gradient(135deg, var(--blue), var(--primary)); font-weight: 700; }
    .kv { display: grid; grid-template-columns: 130px 1fr; gap: 10px 14px; font-size: 14px; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; word-break: break-all; }
    .editor { width: 100%; min-height: 0; height: 100%; padding: 14px; resize: none; color: #d8f7ff; line-height: 1.55; font-family: Consolas, "SFMono-Regular", monospace; overflow: auto; }
    .json { height: 100%; max-height: 100%; overflow: auto; white-space: pre-wrap; word-break: break-word; color: #d4eef8; font-family: Consolas, "SFMono-Regular", monospace; font-size: 12px; }
    .empty { padding: 36px 10px; text-align: center; color: var(--muted); }
    .alert {
      display: none;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 209, 102, 0.32);
      border-radius: 6px;
      padding: 11px 13px;
      color: #ffe1a1;
      background: rgba(255, 209, 102, 0.1);
    }
    .alert.show { display: block; }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 80;
      display: none;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 12px 14px;
      color: var(--primary);
      background: rgba(7, 19, 32, 0.96);
      box-shadow: var(--shadow);
    }
    .toast.show { display: block; }
    .loading { opacity: 0.7; pointer-events: none; }
    #app > .view-shell > .grid.two,
    #app > .view-shell > .grid.cards,
    #app > .view-shell > .grid.three {
      flex: 0 0 auto;
    }

    @media (max-width: 1600px) {
      .nav button { font-size: 11px; gap: 6px; }
      .metric strong { font-size: 24px; }
      .chart { height: min(22vh, 220px); min-height: 150px; }
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { border-radius: 4px; background: rgba(0, 240, 255, 0.22); }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-side">
        <div class="login-bolt"></div>
        <h2>SafeGuard<br>内网敏感文件检测与溯源系统</h2>
        <p>管理员验证通过后进入控制台。所有 Agent、文件、事件、任务与配置数据均来自后端实时接口。</p>
      </div>
      <div class="login-panel">
        <h3>管理员 Token</h3>
        <p>请输入服务端配置的 SAFEGUARD_ADMIN_TOKEN。</p>
        <label class="login-field">
          Token
          <input class="login-input" id="loginTokenInput" type="password" autocomplete="current-password" placeholder="dev-admin-token">
        </label>
        <button class="btn primary" id="loginBtn" style="width:100%;height:46px;">进入系统</button>
        <div class="login-error" id="loginError"></div>
        <div class="login-hint">也支持粘贴 Bearer Token、Authorization: Bearer Token、X-Admin-Token: Token，或 Basic 的 user:password。</div>
      </div>
    </div>
  </section>
  <div class="app locked" id="appShell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">S</div>
        <div>
          <h1>SafeGuard</h1>
          <p>内网敏感文件检测与溯源系统</p>
        </div>
        <div class="top-actions">
          <button class="btn primary" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
          <button class="btn" id="logoutBtn">退出</button>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
    </header>
    <main class="page" id="app"></main>
  </div>
  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="drawer"></aside>
  <div class="toast" id="toast"></div>

  <script>
    const API = '/api/v1';
    const TOKEN_KEY = 'safeguard_admin_token';
    const state = {
      view: location.hash.replace('#/', '') || 'overview',
      loading: false,
      data: {
        agents: [],
        assets: [],
        files: [],
        sensitive: [],
        rules: [],
        events: [],
        uploads: [],
        tasks: [],
        config: {},
        ocr: null,
        grpc: null,
        upgrades: [],
      },
      sensitiveOnly: false,
      selectedArchiveId: '',
      charts: {},
      authenticated: false,
    };

    const views = [
      ['overview', '总览', 'fa-th-large', '统计卡片、实时趋势与安全态势概览'],
      ['agents', 'Agent管理', 'fa-desktop', '终端 Agent 列表、心跳与状态'],
      ['assets', '资产发现', 'fa-network-wired', '内网主机发现与资产缓存'],
      ['files', '文件监控', 'fa-file-alt', '监控文件、检测状态与风险等级'],
      ['sensitive', '敏感档案', 'fa-shield-alt', '敏感文件历史版本和变更时间线'],
      ['rules', '检测规则', 'fa-exclamation-triangle', '关键字、OCR、LLM 与正则检测规则'],
      ['events', '事件日志', 'fa-list-alt', '上传、扫描、违规等系统事件'],
      ['uploads', '上传会话', 'fa-upload', '文件分片上传会话管理'],
      ['tasks', '任务管理', 'fa-tasks', '失败任务列表与重试'],
      ['runtime', '运行状态', 'fa-microchip', 'OCR 服务和 Agent 升级状态'],
      ['config', '系统配置', 'fa-cog', 'JSON 配置编辑与保存'],
    ];

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? '-').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const arr = (payload) => Array.isArray(payload) ? payload : (payload && Array.isArray(payload.items) ? payload.items : []);
    const short = (value, len = 18) => {
      const text = String(value || '-');
      return text.length > len ? `${text.slice(0, len)}...${text.slice(-4)}` : text;
    };
    const fmtTime = (value) => {
      if (!value) return '-';
      const n = Number(value);
      const date = Number.isFinite(n) ? new Date(n > 100000000000 ? n : n * 1000) : new Date(value);
      return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString('zh-CN', { hour12: false });
    };
    const fmtSize = (value) => {
      const n = Number(value || 0);
      if (!n) return '-';
      if (n < 1024) return `${n} B`;
      if (n < 1024 ** 2) return `${(n / 1024).toFixed(1)} KB`;
      if (n < 1024 ** 3) return `${(n / 1024 / 1024).toFixed(1)} MB`;
      return `${(n / 1024 / 1024 / 1024).toFixed(2)} GB`;
    };
    const json = (value) => `<pre class="json">${escapeHtml(JSON.stringify(value, null, 2))}</pre>`;
    const statusClass = (value) => {
      const v = String(value || '').toLowerCase();
      if (['online', 'ok', 'success', 'completed', 'clean', 'enabled', '启用'].some(x => v.includes(x))) return 'green';
      if (['failed', 'error', 'offline', 'deleted', 'critical', '禁用'].some(x => v.includes(x))) return 'red';
      if (['pending', 'uploading', 'created', 'running', 'warning', 'queued'].some(x => v.includes(x))) return 'yellow';
      return 'blue';
    };
    const badge = (value, label) => `<span class="badge ${statusClass(value)}">${escapeHtml(label || value || '-')}</span>`;
    const boolBadge = (value, yes = '是', no = '否') => badge(value ? 'ok' : 'error', value ? yes : no);
    const valueOrDash = (value) => value === undefined || value === null || value === '' ? '-' : value;
    const firstValue = (...values) => {
      for (const value of values) {
        if (value !== undefined && value !== null && value !== '') return value;
      }
      return '-';
    };
    const errorSummary = (payload) => {
      if (!payload) return '-';
      const value = payload.error || payload.init_error || payload.detail || payload.message || (payload.health && (payload.health.error || payload.health.init_error));
      return valueOrDash(value);
    };
    const missingItemsSummary = (items) => {
      const list = Array.isArray(items) ? items : [];
      if (!list.length) return '无';
      return list.slice(0, 4).join('；') + (list.length > 4 ? `；等 ${list.length} 项` : '');
    };
    const riskBadge = (value) => {
      const v = String(value || '').toLowerCase();
      if (v.includes('critical') || v.includes('严重')) return '<span class="badge red">严重</span>';
      if (v.includes('high') || v.includes('高')) return '<span class="badge red">高危</span>';
      if (v.includes('medium') || v.includes('中')) return '<span class="badge orange">中危</span>';
      if (v.includes('low') || v.includes('低')) return '<span class="badge yellow">低危</span>';
      return '<span class="badge green">安全</span>';
    };

    function currentToken() {
      const input = $('loginTokenInput');
      return ((input && input.value) || localStorage.getItem(TOKEN_KEY) || '').trim();
    }

    function authHeaders() {
      let token = currentToken();
      if (!token) return {};
      const headers = {};
      token = token.replace(/^authorization\s*:\s*/i, '').replace(/^x-admin-token\s*:\s*/i, '');
      if (/^basic\s+/i.test(token) || /^bearer\s+/i.test(token)) {
        headers.Authorization = token;
        if (/^bearer\s+/i.test(token)) headers['X-Admin-Token'] = token.replace(/^bearer\s+/i, '').trim();
      } else if (/^[^:\s]+:[^\s]+$/.test(token)) {
        headers.Authorization = `Basic ${btoa(unescape(encodeURIComponent(token)))}`;
      } else {
        headers.Authorization = `Bearer ${token}`;
        headers['X-Admin-Token'] = token;
      }
      return headers;
    }

    async function request(path, options = {}) {
      const headers = Object.assign({}, authHeaders(), options.headers || {});
      const res = await fetch(`${API}${path}`, Object.assign({}, options, { headers }));
      if (res.status === 401) {
        const error = new Error('管理接口需要有效的管理员 Token。');
        error.status = 401;
        throw error;
      }
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${path}`);
      if (res.status === 204) return null;
      return res.json();
    }

    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.add('show');
      window.clearTimeout(toast.timer);
      toast.timer = window.setTimeout(() => el.classList.remove('show'), 2600);
    }

    function setLoading(value) {
      state.loading = value;
      $('app').classList.toggle('loading', value);
    }

    function initNav() {
      $('nav').innerHTML = views.map(([id, label, icon]) => `
        <button data-view="${id}" class="${state.view === id ? 'active' : ''}">
          <i class="fas ${icon}"></i>${label}
        </button>
      `).join('');
      $('nav').style.setProperty('--nav-count', String(views.length));
      $('nav').addEventListener('click', (event) => {
        const btn = event.target.closest('button[data-view]');
        if (!btn) return;
        switchView(btn.dataset.view);
      });
      $('refreshBtn').addEventListener('click', () => loadView(true));
      $('logoutBtn').addEventListener('click', logout);
    }

    function initLogin() {
      $('loginTokenInput').value = localStorage.getItem(TOKEN_KEY) || '';
      $('loginBtn').addEventListener('click', login);
      $('loginTokenInput').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') login();
      });
      if (currentToken()) login(true);
      else showLogin();
    }

    function showLogin(message = '') {
      state.authenticated = false;
      $('appShell').classList.add('locked');
      $('loginScreen').classList.remove('hidden');
      $('loginError').textContent = message;
      setTimeout(() => $('loginTokenInput').focus(), 0);
    }

    function showApp() {
      state.authenticated = true;
      $('loginScreen').classList.add('hidden');
      $('appShell').classList.remove('locked');
    }

    async function login(silent = false) {
      const token = currentToken();
      if (!token) {
        showLogin('请输入管理员 Token。');
        return;
      }
      $('loginBtn').disabled = true;
      $('loginError').textContent = silent ? '' : '正在验证 Token...';
      try {
        await request('/admin/agents');
        localStorage.setItem(TOKEN_KEY, token);
        showApp();
        await loadView(true);
        if (!silent) toast('Token 验证成功');
      } catch (error) {
        localStorage.removeItem(TOKEN_KEY);
        showLogin('Token 验证失败：' + (error.message || error));
      } finally {
        $('loginBtn').disabled = false;
      }
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      state.data = { agents: [], assets: [], files: [], sensitive: [], rules: [], events: [], uploads: [], tasks: [], config: {}, ocr: null, grpc: null, upgrades: [] };
      showLogin('已退出，请重新输入管理员 Token。');
    }

    function switchView(view) {
      state.view = view;
      location.hash = `/${view}`;
      document.querySelectorAll('.nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
      loadView();
    }

    function shell(title, desc, content, toolbar = '') {
      return `
        <div class="view-shell">
          <div class="alert" id="alert"></div>
          ${toolbar ? `<div class="toolbar">${toolbar}</div>` : ''}
          <div class="view-content">${content}</div>
        </div>
      `;
    }

    function showError(error) {
      if (error && error.status === 401) {
        localStorage.removeItem(TOKEN_KEY);
        showLogin('Token 已失效或无权限，请重新输入。');
        return;
      }
      const view = views.find(v => v[0] === state.view) || views[0];
      $('app').innerHTML = shell(view[1], view[3], `
        <div class="panel">
          <div class="panel-body empty">
            <h3 style="color:#fff;margin-top:0;">后端连接或认证失败</h3>
            <p>${escapeHtml(error.message || error)}</p>
            <p class="muted">请确认后端服务已启动，并在右上角填写管理员 Token。</p>
          </div>
        </div>
      `);
    }

    async function loadView(force = false) {
      if (!state.authenticated) return;
      const view = state.view;
      setLoading(true);
      try {
        if (view === 'overview') await renderOverview(force);
        if (view === 'agents') await renderAgents(force);
        if (view === 'assets') await renderAssets(force);
        if (view === 'files') await renderFiles(force);
        if (view === 'sensitive') await renderSensitive(force);
        if (view === 'rules') await renderRules(force);
        if (view === 'events') await renderEvents(force);
        if (view === 'uploads') await renderUploads(force);
        if (view === 'tasks') await renderTasks(force);
        if (view === 'runtime') await renderRuntime(force);
        if (view === 'config') await renderConfig(force);
      } catch (error) {
        showError(error);
      } finally {
        setLoading(false);
      }
    }

    async function ensureCommon(force = false) {
      const needs = force || !state.data.agents.length && !state.data.files.length && !state.data.events.length;
      if (!needs) return;
      const [agents, assets, files, sensitive, rules, events, uploads, tasks] = await Promise.all([
        request('/admin/agents'),
        request('/admin/assets'),
        request('/admin/files'),
        request('/sensitive-files?page_size=100'),
        request('/rules'),
        request('/admin/events?limit=100'),
        request('/admin/upload-sessions?limit=100'),
        request('/admin/task-failures'),
      ]);
      state.data.agents = arr(agents);
      state.data.assets = arr(assets);
      state.data.files = arr(files);
      state.data.sensitive = arr(sensitive);
      state.data.rules = arr(rules);
      state.data.events = arr(events);
      state.data.uploads = arr(uploads);
      state.data.tasks = arr(tasks);
    }

    function table(columns, rows, options = {}) {
      const body = rows.length ? rows.map(row => `
        <tr data-id="${escapeHtml(options.id ? options.id(row) : '')}">
          ${columns.map(col => `<td class="${col.class || ''}">${col.render ? col.render(row) : escapeHtml(row[col.key])}</td>`).join('')}
        </tr>
      `).join('') : `<tr><td colspan="${columns.length}" class="empty">暂无数据</td></tr>`;
      return `
        <div class="table-wrap">
          <table class="${options.clickable ? 'clickable' : ''}">
            <thead><tr>${columns.map(col => `<th>${escapeHtml(col.title)}</th>`).join('')}</tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    async function renderOverview(force) {
      await ensureCommon(force);
      const agents = state.data.agents;
      const files = state.data.files;
      const sensitive = state.data.sensitive;
      const events = state.data.events;
      const online = agents.filter(a => String(a.status).toUpperCase() === 'ONLINE').length;
      const content = `
        <div class="overview-page">
        <div class="grid cards overview-summary">
          <div class="card"><h3>Agent 总数</h3><div class="metric"><strong>${agents.length}</strong><span>${online} 在线</span></div></div>
          <div class="card"><h3>在线 Agent</h3><div class="metric"><strong>${online}</strong><span>${agents.length ? Math.round(online / agents.length * 100) : 0}%</span></div></div>
          <div class="card"><h3>监控文件</h3><div class="metric"><strong>${files.length}</strong><span>实时库</span></div></div>
          <div class="card"><h3>敏感文件</h3><div class="metric"><strong>${sensitive.total || sensitive.length}</strong><span class="bad">高关注</span></div></div>
        </div>
        <div class="grid two overview-topcharts">
          <section class="panel"><div class="panel-head"><div><h3 class="panel-title">实时趋势</h3><div class="panel-sub">按最近事件聚合扫描、上传、违规趋势</div></div></div><div class="panel-body"><div id="trendChart" class="chart"></div></div></section>
          <section class="panel"><div class="panel-head"><div><h3 class="panel-title">风险分布</h3><div class="panel-sub">根据当前文件风险等级统计</div></div></div><div class="panel-body"><div id="riskChart" class="chart"></div></div></section>
        </div>
        <div class="grid two overview-bottomtables">
          <section class="panel"><div class="panel-head"><h3 class="panel-title">最近事件</h3></div><div class="panel-body">${eventTable(events.slice(0, 8))}</div></section>
          <section class="panel"><div class="panel-head"><h3 class="panel-title">最近失败任务</h3></div><div class="panel-body">${taskTable(state.data.tasks.slice(0, 8), false)}</div></section>
        </div>
        </div>
      `;
      $('app').innerHTML = shell('总览', '统计卡片、ECharts 实时趋势图和近期安全事件。', content);
      drawTrend(events);
      drawRisk(files);
    }

    function drawTrend(events) {
      if (!window.echarts) return;
      const buckets = [];
      const now = Date.now();
      for (let i = 11; i >= 0; i--) {
        const d = new Date(now - i * 2 * 3600 * 1000);
        buckets.push({ label: `${String(d.getHours()).padStart(2, '0')}:00`, event: 0, upload: 0, violation: 0 });
      }
      events.forEach(e => {
        const t = Number(e.timestamp || e.created_at || 0) * 1000;
        const idx = buckets.length - 1 - Math.floor((now - t) / (2 * 3600 * 1000));
        if (idx < 0 || idx >= buckets.length) return;
        const type = String(e.event_type || '').toLowerCase();
        buckets[idx].event += 1;
        if (type.includes('upload')) buckets[idx].upload += 1;
        if (type.includes('violation') || type.includes('sensitive') || type.includes('rule')) buckets[idx].violation += 1;
      });
      const chart = echarts.init($('trendChart'));
      chart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis' },
        legend: { top: 0, textStyle: { color: '#8296a7' } },
        grid: { left: 38, right: 20, top: 42, bottom: 30 },
        xAxis: { type: 'category', data: buckets.map(b => b.label), axisLabel: { color: '#8296a7' }, axisLine: { lineStyle: { color: 'rgba(0,240,255,.22)' } } },
        yAxis: { type: 'value', axisLabel: { color: '#8296a7' }, splitLine: { lineStyle: { color: 'rgba(0,240,255,.08)' } } },
        series: [
          { name: '事件', type: 'line', smooth: true, data: buckets.map(b => b.event), itemStyle: { color: '#00f0ff' }, areaStyle: { color: 'rgba(0,240,255,.12)' } },
          { name: '上传', type: 'line', smooth: true, data: buckets.map(b => b.upload), itemStyle: { color: '#4b9eff' }, areaStyle: { color: 'rgba(75,158,255,.10)' } },
          { name: '违规', type: 'line', smooth: true, data: buckets.map(b => b.violation), itemStyle: { color: '#ff3d5a' }, areaStyle: { color: 'rgba(255,61,90,.10)' } },
        ],
      });
      state.charts.trend = chart;
    }

    function drawRisk(files) {
      if (!window.echarts) return;
      const counts = { 高危: 0, 中危: 0, 低危: 0, 安全: 0 };
      files.forEach(f => {
        const risk = String(f.risk_level || '').toLowerCase();
        if (f.is_sensitive && (risk.includes('high') || risk.includes('critical'))) counts.高危 += 1;
        else if (f.is_sensitive && risk.includes('medium')) counts.中危 += 1;
        else if (f.is_sensitive) counts.低危 += 1;
        else counts.安全 += 1;
      });
      const chart = echarts.init($('riskChart'));
      chart.setOption({
        tooltip: { trigger: 'item' },
        legend: { bottom: 0, textStyle: { color: '#8296a7' } },
        color: ['#ff3d5a', '#ff8a3d', '#ffd166', '#00d68f'],
        series: [{ type: 'pie', radius: ['45%', '72%'], center: ['50%', '44%'], data: Object.entries(counts).map(([name, value]) => ({ name, value })), label: { color: '#d8e7ef' } }],
      });
      state.charts.risk = chart;
    }

    async function renderAgents(force) {
      if (force || !state.data.agents.length) state.data.agents = arr(await request('/admin/agents'));
      const toolbar = `<div class="search-wrap"><i class="fas fa-search"></i><input class="field search" id="agentSearch" placeholder="搜索 ID / 主机名 / IP"></div><select class="select" id="agentStatus"><option value="">全部状态</option><option value="ONLINE">在线</option><option value="OFFLINE">离线</option></select>`;
      $('app').innerHTML = shell('Agent管理', '显示所有 Agent 列表、状态、最后心跳与扫描进度。', agentPanel(state.data.agents), toolbar);
      $('agentSearch').addEventListener('input', () => filterAgentTable());
      $('agentStatus').addEventListener('change', () => filterAgentTable());
      bindTableClick('agentsTable', async (id) => openAgent(id));
    }

    function agentPanel(rows) {
      return `<section class="panel"><div class="panel-head"><h3 class="panel-title">${rows.length} Agents</h3></div><div class="panel-body">${agentTable(rows)}</div></section>`;
    }
    function agentTable(rows) {
      return table([
        { title: 'Agent ID', render: r => `<span class="mono" title="${escapeHtml(r.agent_id)}">${escapeHtml(short(r.agent_id))}</span>` },
        { title: '主机名', key: 'hostname' },
        { title: 'IP', key: 'ip' },
        { title: '状态', render: r => badge(r.status) },
        { title: '最后心跳', render: r => fmtTime(r.last_heartbeat) },
        { title: '版本', key: 'agent_version' },
        { title: '扫描状态', render: r => badge((r.scan_progress || {}).scan_status || '-') },
      ], rows, { clickable: true, id: r => r.agent_id }).replace('<table class="clickable">', '<table id="agentsTable" class="clickable">');
    }
    function filterAgentTable() {
      const q = $('agentSearch').value.toLowerCase();
      const s = $('agentStatus').value;
      const rows = state.data.agents.filter(r => JSON.stringify(r).toLowerCase().includes(q) && (!s || String(r.status).toUpperCase() === s));
      $('app').querySelector('.panel-body').innerHTML = agentTable(rows);
      bindTableClick('agentsTable', async (id) => openAgent(id));
    }

    async function renderAssets(force) {
      if (force || !state.data.assets.length) state.data.assets = arr(await request('/admin/assets'));
      const toolbar = `<button class="btn primary" id="refreshAssets"><i class="fas fa-sync-alt"></i> 刷新资产发现</button><div class="search-wrap"><i class="fas fa-search"></i><input class="field search" id="assetSearch" placeholder="搜索 IP / 主机 / MAC"></div>`;
      $('app').innerHTML = shell('资产发现', '展示后端资产发现缓存，并支持调用后端刷新本机与 ARP 资产信息。', assetPanel(state.data.assets), toolbar);
      $('refreshAssets').addEventListener('click', async () => {
        setLoading(true);
        try {
          state.data.assets = arr(await request('/admin/assets/refresh', { method: 'POST' }));
          await renderAssets(false);
          toast('资产发现已刷新');
        } finally { setLoading(false); }
      });
      $('assetSearch').addEventListener('input', () => {
        const q = $('assetSearch').value.toLowerCase();
        $('app').querySelector('.panel-body').innerHTML = assetTable(state.data.assets.filter(r => JSON.stringify(r).toLowerCase().includes(q)));
      });
    }
    function assetPanel(rows) {
      return `<section class="panel"><div class="panel-head"><h3 class="panel-title">${rows.length} Assets</h3></div><div class="panel-body">${assetTable(rows)}</div></section>`;
    }
    function assetTable(rows) {
      return table([
        { title: 'IP', key: 'ip' },
        { title: '主机名', key: 'hostname' },
        { title: 'MAC', key: 'mac' },
        { title: '系统', key: 'os_type' },
        { title: '存活', render: r => badge(r.is_alive ? 'online' : 'offline', r.is_alive ? '在线' : '离线') },
        { title: '发现方式', key: 'discovery_tool' },
        { title: '开放端口', render: r => escapeHtml((r.open_ports || []).join(', ') || '-') },
        { title: '最后发现', render: r => fmtTime(r.last_seen_at) },
      ], rows);
    }

    async function renderFiles(force) {
      if (force || !state.data.files.length) state.data.files = arr(await request(`/admin/files?sensitive=${state.sensitiveOnly ? 'true' : 'false'}`));
      const toolbar = `<div class="search-wrap"><i class="fas fa-search"></i><input class="field search" id="fileSearch" placeholder="搜索文件名 / 路径 / Agent"></div><button class="btn ${state.sensitiveOnly ? 'primary' : ''}" id="sensitiveToggle">仅敏感</button><select class="select" id="riskFilter"><option value="">全部风险</option><option value="high">高危</option><option value="medium">中危</option><option value="low">低危</option></select>`;
      $('app').innerHTML = shell('文件监控', '文件列表，支持仅敏感筛选，显示风险等级、检测状态与路径。', filePanel(state.data.files), toolbar);
      $('sensitiveToggle').addEventListener('click', async () => {
        state.sensitiveOnly = !state.sensitiveOnly;
        state.data.files = arr(await request(`/admin/files?sensitive=${state.sensitiveOnly ? 'true' : 'false'}`));
        await renderFiles(false);
      });
      $('fileSearch').addEventListener('input', filterFileTable);
      $('riskFilter').addEventListener('change', filterFileTable);
      bindTableClick('filesTable', id => openFile(id));
    }
    function filePanel(rows) {
      return `<section class="panel"><div class="panel-head"><h3 class="panel-title">${rows.length} Files</h3></div><div class="panel-body">${fileTable(rows)}</div></section>`;
    }
    function fileTable(rows) {
      const html = table([
        { title: '文件名', key: 'file_name' },
        { title: 'Agent', render: r => escapeHtml((r.agents || []).join(', ') || '-') },
        { title: '路径', class: 'truncate', render: r => `<span title="${escapeHtml((r.current_paths || []).join('; '))}">${escapeHtml((r.current_paths || [])[0] || '-')}</span>` },
        { title: '风险等级', render: r => r.is_sensitive ? riskBadge(r.risk_level) : badge('clean', '非敏感') },
        { title: '检测状态', render: r => badge(r.detection_status) },
        { title: '最后修改', render: r => fmtTime(r.updated_at) },
        { title: '大小', render: r => fmtSize(r.file_size) },
      ], rows, { clickable: true, id: r => r.file_hash });
      return html.replace('<table class="clickable">', '<table id="filesTable" class="clickable">');

    function filterFileTable() {
      const q = $('fileSearch').value.toLowerCase();
      const risk = $('riskFilter').value.toLowerCase();
      const rows = state.data.files.filter(r => JSON.stringify(r).toLowerCase().includes(q) && (!risk || String(r.risk_level || '').toLowerCase().includes(risk)));
      $('app').querySelector('.panel-body').innerHTML = fileTable(rows);
      bindTableClick('filesTable', id => openFile(id));

    async function renderSensitive(force) {
      if (force || !state.data.sensitive.length) state.data.sensitive = arr(await request('/sensitive-files?page_size=100'));
      if (!state.selectedArchiveId && state.data.sensitive[0]) state.selectedArchiveId = state.data.sensitive[0].tracked_file_id;
      const content = `<div class="grid side"><section class="panel"><div class="panel-head"><h3 class="panel-title">敏感文件</h3></div><div class="panel-body"><div class="split-list">${state.data.sensitive.map(item => `
        <div class="list-item ${item.tracked_file_id === state.selectedArchiveId ? 'active' : ''}" data-archive="${escapeHtml(item.tracked_file_id)}">
          <strong>${escapeHtml(item.current_name || item.current_path)}</strong>
          <div class="muted" style="margin-top:6px;">${fmtTime(item.last_seen_at)} · ${escapeHtml(item.agent_id)}</div>
        </div>`).join('') || '<div class="empty">暂无敏感档案</div>'}</div></div></section><section class="panel" id="archiveDetail"><div class="panel-body empty">请选择敏感档案</div></section></div>`;
      $('app').innerHTML = shell('敏感档案', '追踪敏感文件历史版本、重命名、删除和内容差异摘要。', content);
      document.querySelectorAll('[data-archive]').forEach(el => el.addEventListener('click', async () => {
        state.selectedArchiveId = el.dataset.archive;
        await renderSensitive(false);
      }));
      if (state.selectedArchiveId) await loadArchiveDetail(state.selectedArchiveId);
    }

    async function loadArchiveDetail(id) {
      const detail = await request(`/sensitive-files/${encodeURIComponent(id)}/versions`);
      const file = detail.file || {};
      const versions = arr(detail.versions);
      $('archiveDetail').innerHTML = `<div class="panel-head"><div><h3 class="panel-title">${escapeHtml(file.current_name || file.current_path || id)}</h3><div class="panel-sub">${escapeHtml(file.current_path || '')}</div></div>${riskBadge(file.sensitive_level)}</div><div class="panel-body"><div class="timeline">${versions.map(v => `
        <div class="timeline-item">
          <div style="display:flex;justify-content:space-between;gap:12px;"><strong>V${escapeHtml(v.version_no)} · ${escapeHtml(v.event_type)}</strong>${badge(v.event_type)}</div>
          <div class="muted" style="margin-top:6px;">${fmtTime(v.snapshot_time)} · ${escapeHtml(v.name_at_that_time || '')}</div>
          <div style="margin-top:10px;">${escapeHtml(v.change_summary || v.snapshot_retention_note || '-')}</div>
          <div class="muted" style="margin-top:8px;">${escapeHtml(JSON.stringify(v.change_detail_json || {}))}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">${archiveDownloadButtons(id, v)}</div>
        </div>`).join('') || '<div class="empty">暂无版本历史</div>'}</div></div>`;
      document.querySelectorAll('[data-archive-download]').forEach(btn => btn.addEventListener('click', async (event) => {
        event.stopPropagation();
        try {
          await downloadArchiveArtifact(btn.dataset.trackedId, btn.dataset.versionId, btn.dataset.artifact, btn.dataset.filename);
        } catch (error) {
          toast(error.message || '下载失败');
        }
      }));
    }

    function archiveDownloadButtons(trackedId, version) {
      const buttons = [];
      const baseName = safeDownloadName(version.name_at_that_time || version.path_at_that_time || version.version_id);
      if (version.can_download !== false) buttons.push(downloadButton(trackedId, version.version_id, 'source', `下载原文件`, baseName));
      if (version.has_highlight) buttons.push(downloadButton(trackedId, version.version_id, 'highlight', `下载高亮文件`, `${baseName}.highlight`));
      if (version.has_diff) buttons.push(downloadButton(trackedId, version.version_id, 'diff', `下载差异文件`, `${baseName}.diff`));
      return buttons.join('') || '<span class="muted">无可下载归档</span>';
    }

    function safeDownloadName(value) {
      const text = String(value || 'archive').split(/[\\/]/).pop() || 'archive';
      return text.replace(/[<>:"|?*]+/g, '_');
    }

    function downloadButton(trackedId, versionId, artifact, label, filename) {
      return `<button class="btn small" data-archive-download="1" data-tracked-id="${escapeHtml(trackedId)}" data-version-id="${escapeHtml(versionId)}" data-artifact="${escapeHtml(artifact)}" data-filename="${escapeHtml(filename || versionId)}"><i class="fas fa-download"></i>${label}</button>`;
    }

    async function downloadArchiveArtifact(trackedId, versionId, artifact, filename) {
      const suffix = artifact === 'highlight' ? '/download-highlight' : artifact === 'diff' ? '/download-diff' : '/download';
      const res = await fetch(`${API}/sensitive-files/${encodeURIComponent(trackedId)}/versions/${encodeURIComponent(versionId)}${suffix}`, { headers: authHeaders() });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}: 下载失败`);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename || versionId;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast('归档文件下载已开始');
    }

    function bindTabs() {
      document.querySelectorAll('[data-tab]').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('[data-tab]').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        $('tabOverview').style.display = btn.dataset.tab === 'overview' ? '' : 'none';
        if ($('tabVersions')) $('tabVersions').style.display = btn.dataset.tab === 'versions' ? '' : 'none';
        $('tabJson').style.display = btn.dataset.tab === 'json' ? '' : 'none';
      }));
    }
    function openDrawer(title, body) {
      $('drawerMask').classList.add('show');
      $('drawer').classList.add('show');
      $('drawer').innerHTML = `<div class="drawer-head"><div><h3 class="drawer-title">${escapeHtml(title)}</h3><p class="muted">真实后端数据</p></div><button class="btn" onclick="closeDrawer()">关闭</button></div><div class="drawer-body">${body}</div>`;
    }
    function closeDrawer() {
      $('drawerMask').classList.remove('show');
      $('drawer').classList.remove('show');
      $('drawer').innerHTML = '';
    }
    window.closeDrawer = closeDrawer;

    function initParticles() {
      const canvas = $('particle-canvas');
      const ctx = canvas.getContext('2d');
      let w = 0, h = 0, particles = [];
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        const count = Math.min(88, Math.max(46, Math.floor(w * h / 22000)));
        particles = Array.from({ length: count }, () => ({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.38, vy: (Math.random() - 0.5) * 0.38, r: Math.random() * 1.8 + 0.7 }));
        Object.values(state.charts).forEach(chart => chart && chart.resize && chart.resize());
      }
      function tick() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach((p, i) => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > w) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,240,255,.55)'; ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j], d = Math.hypot(p.x - q.x, p.y - q.y);
            if (d < 130) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.strokeStyle = `rgba(0,240,255,${(1 - d / 130) * 0.16})`; ctx.stroke(); }
          }
        });
        requestAnimationFrame(tick);
      }
      resize(); tick(); window.addEventListener('resize', resize);
    }

    function applyViewportMode() {
      const vv = window.visualViewport;
      const scale = vv && Number.isFinite(vv.scale) ? vv.scale : 1;
      const height = vv && Number.isFinite(vv.height) ? vv.height : window.innerHeight;
      const compact = height < 980 || scale > 1.02;
      document.body.classList.toggle('viewport-compact', compact);
      Object.values(state.charts).forEach(chart => chart && chart.resize && chart.resize());
    }

    document.addEventListener('DOMContentLoaded', () => {
      applyViewportMode();
      initParticles();
      initNav();
      window.addEventListener('resize', applyViewportMode);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', applyViewportMode);
      }
      window.addEventListener('hashchange', () => {
        state.view = location.hash.replace('#/', '') || 'overview';
        document.querySelectorAll('.nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.view === state.view));
        if (state.authenticated) loadView();
      });
      $('drawerMask').addEventListener('click', closeDrawer);
      initLogin();
    });
  </script>
</body>
